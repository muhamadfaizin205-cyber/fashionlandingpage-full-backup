name: Hourly Marketing Roast Check

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-and-roast:
    runs-on: ubuntu-latest
    steps:
      - name: Check progress and roast if behind
        run: |
          echo "=== Roast Check: $(date '+%Y-%m-%d %H:%M') ==="
          RESPONSE=$(curl -s -X GET \
            "https://www.createclothingdesign.com/api/marketing-roast" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            -w "\nHTTP_STATUS:%{http_code}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          echo "Status: $HTTP_STATUS"
          echo "=== Done ==="
