name: Auto Article Publisher

on:
  schedule:
    - cron: '0 9 * * *'  # Setiap hari jam 16:00 WIB (09:00 UTC)
  workflow_dispatch:      # Bisa trigger manual dari GitHub Actions tab

jobs:
  publish-articles:
    runs-on: ubuntu-latest

    steps:
      - name: Publish Articles Today
        run: |
          echo "=== Auto Article Publisher: $(date '+%Y-%m-%d %H:%M') ==="

          RESPONSE=$(curl -s -X GET \
            "https://www.createclothingdesign.com/api/auto-article" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            -w "\nHTTP_STATUS:%{http_code}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")

          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: API returned $HTTP_STATUS"
            exit 1
          fi

          echo "=== Done! Article published successfully ==="
