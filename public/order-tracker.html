<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Track Your Order — Dean Designers</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--green:#1DBF73;--green-dark:#19A463;--green-bg:rgba(29,191,115,0.08);--green-border:rgba(29,191,115,0.2);--bg:#F7F8FA;--card:#fff;--txt:#222325;--txt2:#62646A;--txt3:#95979D;--border:#E4E5E7;--shadow:0 2px 12px rgba(0,0,0,0.06);--blue:#446EE7;--yellow:#FFB33E;--red:#FF5A5F;--purple:#8E63F4}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;font-size:14px;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}

/* ═══ MODERN LAYOUT — Icon Sidebar + Content ═══ */
.app-wrap{display:flex;min-height:100vh;background:var(--bg)}
.sidebar{width:200px;background:rgba(255,255,255,0.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:16px;left:16px;bottom:16px;z-index:60;padding:20px 12px;border:1px solid rgba(255,255,255,0.5);border-radius:22px;box-shadow:0 8px 32px rgba(0,0,0,0.06)}
.sb-logo{width:100%;display:flex;align-items:center;gap:10px;padding:6px 10px;margin-bottom:30px}.sb-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#1DBF73,#17B169);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;box-shadow:0 4px 14px rgba(29,191,115,0.3)}.sb-logo-text{font-size:14px;font-weight:800;color:#1DBF73}
.sb-icons{display:flex;flex-direction:column;gap:4px;flex:1}
.sb-ic{width:100%;height:auto;padding:10px 14px;border-radius:12px;display:flex;align-items:center;gap:11px;color:#4A5568;cursor:pointer;transition:all .2s;position:relative;border:none;background:transparent;font-size:13px;font-weight:600}
.sb-ic:hover{background:rgba(29,191,115,0.08);color:#1a1a2e}
.sb-ic.active{background:linear-gradient(135deg,#1DBF73,#16a34a);color:#fff;box-shadow:0 6px 20px rgba(29,191,115,0.35);transform:scale(1.05);border-radius:16px}
.sb-ic-badge{position:absolute;top:6px;right:6px;min-width:18px;height:18px;background:#EF4444;color:#fff;font-size:10px;font-weight:800;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid #0F1419}
.sb-ic-tip{position:static;transform:none;background:none;color:inherit;font-size:13px;font-weight:inherit;padding:0;border-radius:0;white-space:nowrap;opacity:1;pointer-events:none;box-shadow:none;display:inline}
.sb-ic:hover .sb-ic-tip{opacity:1}
.sb-divider{display:none !important}
.sb-profile-ic{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1DBF73,#17B169);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;cursor:pointer;margin:0 auto;overflow:hidden;border:2px solid rgba(29,191,115,0.3);transition:all .2s;box-shadow:0 4px 12px rgba(29,191,115,0.2)}
.sb-profile-ic:hover{border-color:#1DBF73;transform:scale(1.08);box-shadow:0 6px 20px rgba(29,191,115,0.35)}
.sb-profile-ic img{width:100%;height:100%;object-fit:cover}

.main-area{flex:1;margin-left:232px;margin-top:16px;margin-right:16px;margin-bottom:16px;min-width:0;display:flex;flex-direction:column;background:rgba(255,255,255,0.6);backdrop-filter:blur(10px);border-radius:22px;border:1px solid rgba(255,255,255,0.5);box-shadow:0 8px 32px rgba(0,0,0,0.04);overflow:hidden}
.m-bar{display:none;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30}
.hamburger{width:38px;height:38px;border-radius:9px;background:var(--bg);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--txt2);cursor:pointer}

/* Mobile Drawer */
.mobile-drawer{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.4);opacity:0;pointer-events:none;transition:opacity .2s}
.mobile-drawer.open{opacity:1;pointer-events:auto}
.mobile-drawer-content{position:absolute;left:0;top:0;bottom:0;width:260px;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);padding:20px 14px;transform:translateX(-100%);transition:transform .3s cubic-bezier(.22,1,.36,1);border-radius:0 22px 22px 0;box-shadow:4px 0 30px rgba(0,0,0,0.08)}
.mobile-drawer.open .mobile-drawer-content{transform:translateX(0)}
.md-item{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:12px;color:#7C8DB5;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:4px;transition:all .2s}
.md-item:hover{background:rgba(29,191,115,0.08);color:#1a1a2e}
.md-item.active{background:linear-gradient(135deg,#1DBF73,#16a34a);color:#fff;box-shadow:0 4px 16px rgba(29,191,115,0.3)}
.md-divider{height:1px;background:#1F2937;margin:10px 4px}

.container{width:100%;max-width:100%;padding:24px 28px 40px;box-sizing:border-box}

/* Welcome banner */
.welcome{background:linear-gradient(135deg,#1DBF73,#16a34a);border-radius:14px;padding:20px 22px;color:#fff;margin-bottom:18px;animation:fadeUp .3s;display:flex;align-items:center;gap:16px}
.welcome-icon{width:44px;height:44px;background:rgba(255,255,255,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.welcome h2{font-size:16px;font-weight:800;margin-bottom:2px}.welcome p{font-size:12px;opacity:.9}
.welcome-close{margin-left:auto;background:rgba(255,255,255,0.2);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0}

/* Order selector */
.order-selector{margin-bottom:16px}
.order-select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;background:var(--card);color:var(--txt);cursor:pointer;outline:none;appearance:auto;font-family:inherit}

@media(max-width:900px){
  .sidebar{display:none !important}
  .main-area{margin:0 !important;border-radius:0 !important}
  .mobile-drawer{display:block}
  .m-bar{display:flex}
  .container{padding:14px 14px 60px}
}

/* Login */
.login{max-width:420px;margin:60px auto 0;background:var(--card);border-radius:18px;padding:36px 28px;box-shadow:0 8px 32px rgba(0,0,0,0.08);animation:fadeUp .3s}
.login-icon{width:56px;height:56px;background:var(--green);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:#fff;box-shadow:0 6px 20px rgba(29,191,115,0.25)}
.login h1{font-size:22px;font-weight:800;text-align:center;margin-bottom:4px}
.login-sub{text-align:center;font-size:13px;color:var(--txt2);margin-bottom:24px;line-height:1.5}
.login-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:13px 16px;font-size:14px;outline:none;transition:border .15s;font-family:inherit;color:var(--txt)}
.login-input:focus{border-color:var(--green)}
.login-btn{width:100%;background:var(--green);color:#fff;border-radius:10px;padding:14px;font-size:14px;font-weight:700;margin-top:12px;transition:background .15s}
.login-btn:hover{background:#17B169}
.login-error{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:10px;font-size:12px;color:#DC2626;margin-top:10px;display:none}
.login-note{font-size:11px;color:var(--txt3);text-align:center;margin-top:16px}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--card);border-radius:12px;padding:4px;border:1px solid var(--border);margin-bottom:18px}
.tab{flex:1;padding:10px;border-radius:9px;font-size:13px;font-weight:600;text-align:center;color:var(--txt2);transition:all .15s;cursor:pointer;position:relative}
.tab:hover{color:var(--txt)}
.tab.active{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(29,191,115,0.25)}
.tab-badge{position:absolute;top:4px;right:8px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--card)}

/* Status header */
.order-card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:14px;animation:fadeUp .3s}
.order-head{padding:18px 20px;background:linear-gradient(135deg,var(--green-bg),transparent);border-bottom:1px solid var(--border)}
.order-head-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.order-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--txt3)}
.os-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.os-new{background:rgba(68,110,231,0.1);color:var(--blue)}.os-working{background:rgba(255,179,62,0.12);color:#D97706}.os-review{background:rgba(142,99,244,0.1);color:var(--purple)}.os-revision{background:rgba(255,90,95,0.1);color:var(--red)}.os-completed,.os-delivered{background:var(--green);color:#fff}
.os-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.order-brand{font-size:18px;font-weight:800;letter-spacing:-.3px;margin-bottom:2px}
.order-service{font-size:13px;color:var(--txt2)}

/* Deadline */
.deadline{display:flex;align-items:center;gap:10px;padding:14px 20px;background:var(--card);border-bottom:1px solid var(--border)}
.dl-label{font-size:11px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.dl-timer{display:flex;gap:6px}
.dl-block{background:var(--bg);border-radius:8px;padding:6px 10px;text-align:center;min-width:48px}
.dl-num{font-size:18px;font-weight:800;color:var(--txt);line-height:1}
.dl-unit{font-size:9px;color:var(--txt3);text-transform:uppercase;font-weight:600;letter-spacing:.5px}
.dl-warning .dl-num{color:var(--yellow)}
.dl-urgent .dl-num{color:var(--red)}
.dl-done{color:var(--green);font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}

/* Timeline */
.timeline{padding:20px;display:flex;flex-direction:column;gap:0}
.tl-title{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.tl-step{display:flex;gap:12px;position:relative;padding-bottom:16px}
.tl-step:last-child{padding-bottom:0}
.tl-step:not(:last-child)::before{content:"";position:absolute;left:13px;top:28px;bottom:0;width:2px;background:var(--border)}
.tl-step.done:not(:last-child)::before{background:var(--green)}
.tl-dot{width:28px;height:28px;border-radius:50%;background:var(--bg);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;color:var(--txt3);z-index:1}
.tl-step.done .tl-dot{background:var(--green);border-color:var(--green);color:#fff}
.tl-step.active .tl-dot{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 0 0 4px var(--green-bg);animation:pulse 2s infinite}
.tl-name{font-size:13px;font-weight:700;color:var(--txt)}.tl-step.upcoming .tl-name{color:var(--txt3)}
.tl-step.active .tl-name{color:var(--green)}
.tl-desc{font-size:12px;color:var(--txt2);margin-top:1px}.tl-step.upcoming .tl-desc{color:var(--txt3)}

/* Details grid */
.details{padding:0 20px 20px}
.det-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.det{background:var(--bg);border-radius:10px;padding:12px 14px}
.det-label{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.det-val{font-size:13px;font-weight:700;color:var(--txt);word-break:break-word}
.det.hl{background:var(--green-bg);border:1px solid var(--green-border);grid-column:span 2}
.det.hl .det-val{color:var(--green);font-size:18px;font-weight:800}
.brief-box{background:var(--bg);border-radius:10px;padding:14px;margin-top:10px}
.brief-label{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.brief-text{font-size:13px;color:var(--txt);line-height:1.6;white-space:pre-wrap;max-height:120px;overflow-y:auto}
.brief-imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:10px}
.brief-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:transform .2s}
.brief-img:hover{transform:scale(1.05)}
.brief-imgs-label{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:12px;margin-bottom:4px}
.brief-img-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;cursor:pointer;animation:fadeUp .2s}
.brief-img-overlay img{max-width:90vw;max-height:90vh;border-radius:10px;object-fit:contain}

/* Chat */
.chat-area{background:#ECE5DD;border-radius:18px;border:none;box-shadow:0 2px 12px rgba(0,0,0,0.04);overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - 140px);min-height:400px;animation:fadeUp .3s}
.chat-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--card)}
.chat-head-avatar{width:36px;height:36px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;position:relative}
.chat-head-dot{position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;border:2px solid var(--card);background:#9CA3AF;transition:background .3s}
.chat-head-dot.online{background:#4ADE80}
.chat-head-info{flex:1;min-width:0}
.chat-head-info h3{font-size:14px;font-weight:700;margin:0}
.chat-head-info p{font-size:11px;color:var(--txt3);margin:0}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:6px;background:#F0F2F5;scroll-behavior:smooth}
.chat-msgs::-webkit-scrollbar{width:5px}.chat-msgs::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:3px}
.chat-empty{text-align:center;color:var(--txt3);font-size:13px;padding:50px 16px;display:flex;flex-direction:column;align-items:center;gap:10px}
/* Message row */
.cm{display:flex;flex-direction:column;max-width:82%;animation:fadeUp .15s;position:relative}
.cm.client{align-self:flex-end;align-items:flex-end}
.cm.admin{align-self:flex-start;align-items:flex-start}
/* Reply preview inside message */
.cm-reply{display:flex;gap:0;margin-bottom:3px;border-radius:8px;overflow:hidden;font-size:11.5px;cursor:pointer;max-width:100%}
.cm.client .cm-reply{background:rgba(255,255,255,.15)}
.cm.admin .cm-reply{background:#F0F2F5}
.cm-reply-bar{width:3.5px;flex-shrink:0;background:var(--green);border-radius:3px 0 0 3px}
.cm-reply-body{padding:4px 8px;overflow:hidden;min-width:0}
.cm-reply-name{display:block;font-weight:700;font-size:10.5px;color:var(--green);margin-bottom:1px}
.cm.client .cm-reply-name{color:rgba(255,255,255,.85)}
.cm-reply-text{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.65;font-size:11px}
/* Bubble */
.cm-bubble{padding:8px 10px 5px;border-radius:12px;font-size:13.5px;line-height:1.5;word-break:break-word;min-width:70px;position:relative;white-space:pre-wrap}
.cm.admin .cm-bubble{background:#fff;color:var(--txt);border:1px solid var(--border);border-bottom-left-radius:4px}
.cm.client .cm-bubble{background:var(--green);color:#fff;border-bottom-right-radius:4px}
/* Message meta (time + edited + receipts) */
.cm-meta{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:2px}
.cm-time{font-size:10px;opacity:.5}
.cm-edited{font-size:9.5px;opacity:.45;font-style:italic}
.cm-receipt{flex-shrink:0;margin-left:1px}
/* Quick action buttons on hover */
.cm-actions{position:absolute;top:2px;display:flex;gap:2px;opacity:0;transition:opacity .12s}
.cm.client .cm-actions{left:-60px}
.cm.admin .cm-actions{right:-60px}
.cm:hover .cm-actions{opacity:1}
.cm-act{width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.05);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#667781;font-size:12px;transition:all .1s}
.cm-act:hover{background:rgba(0,0,0,.1)}
/* Image in message */
.cm-img{max-width:240px;max-height:200px;border-radius:8px;cursor:pointer;object-fit:cover;margin-bottom:4px;display:block}
/* Voice player */
.cm-voice{display:flex;align-items:center;gap:8px;min-width:180px;padding:4px 0}
.cm-voice-btn{width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cm.client .cm-voice-btn{background:rgba(255,255,255,.2);color:#fff}
.cm.admin .cm-voice-btn{background:var(--green);color:#fff}
.cm-voice-track{flex:1;height:4px;background:rgba(128,128,128,.2);border-radius:2px;overflow:hidden}
.cm-voice-fill{height:100%;border-radius:2px;transition:width .1s linear}
.cm.client .cm-voice-fill{background:rgba(255,255,255,.5)}
.cm.admin .cm-voice-fill{background:var(--green)}
.cm-voice-dur{font-size:10.5px;opacity:.55;min-width:28px;flex-shrink:0}
/* Typing indicator */
.cm-typing{display:flex;gap:4px;padding:6px 2px;align-items:center}
.cm-typing span{width:6px;height:6px;border-radius:50%;background:#8696A0;animation:typDot 1.4s infinite}
.cm-typing span:nth-child(2){animation-delay:.2s}
.cm-typing span:nth-child(3){animation-delay:.4s}
@keyframes typDot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
/* Reply/Edit action bar */
.chat-action-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0}
.chat-action-bar-icon{color:var(--green);flex-shrink:0}
.chat-action-bar-body{flex:1;min-width:0}
.chat-action-bar-label{display:block;font-size:10.5px;font-weight:700;color:var(--green)}
.chat-action-bar-text{display:block;font-size:11.5px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-action-bar-close{background:none;border:none;color:var(--txt3);cursor:pointer;padding:4px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1}
.chat-action-bar-close:hover{background:rgba(0,0,0,.06)}
/* Input bar */
.chat-bar{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:var(--card);align-items:flex-end}
.chat-inp{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;outline:none;font-family:inherit;color:var(--txt);background:var(--bg);transition:border .15s;resize:none;max-height:100px;line-height:1.4;min-height:40px}
.chat-inp:focus{border-color:var(--green);background:#fff}
.chat-send{width:38px;height:38px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;border:none;cursor:pointer}
.chat-send:hover{background:var(--green-dark)}
.chat-send:disabled{opacity:.4;cursor:not-allowed}
.chat-img-btn{width:38px;height:38px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt3);transition:all .15s;flex-shrink:0;border:none}
.chat-img-btn:hover{background:var(--green-bg);color:var(--green)}
.chat-mic-btn{width:38px;height:38px;border-radius:50%;background:transparent;border:none;color:var(--txt3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.chat-mic-btn:hover{color:var(--green)}
/* Recording bar */
.chat-rec{display:flex;align-items:center;gap:10px;flex:1;padding:4px 0}
.chat-rec-dot{width:10px;height:10px;border-radius:50%;background:#EF4444;animation:recPulse 1s infinite}
@keyframes recPulse{0%,100%{opacity:1}50%{opacity:.3}}
.chat-rec-time{font-size:14px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;min-width:36px}
.chat-rec-label{font-size:12px;color:var(--txt3);flex:1}
.chat-rec-stop{width:38px;height:38px;border-radius:50%;border:none;background:#EF4444;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.chat-rec-stop:hover{background:#DC2626}
/* Context menu */

<body>
<div class="app-wrap" id="app-wrap"><div id="sidebar-mount"></div><div class="main-area" id="main-area"><div id="mbar-mount"></div><div class="container" id="root"><div class="loading"><div class="spinner"></div> Loading...</div></div></div></div>
<div id="drawer-mount"></div>

<script>
const SB_URL="https://zqawpdspxdcmofnmrbku.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxYXdwZHNweGRjbW9mbm1yYmt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTE0MTYsImV4cCI6MjA5NzI2NzQxNn0.vRPaxLCPNPbNnHpsAClr_gr_pCpcbvBbDdAcEGhCT_E";
const SK="dd_customer_email";
const STATUSES=['new','working','review','revision','completed','delivered'];
const S_LABELS={new:'New Order',working:'In Progress',review:'Under Review',revision:'In Revision',completed:'Completed',delivered:'Delivered'};
const S_CLASS={new:'os-new',working:'os-working',review:'os-review',revision:'os-revision',completed:'os-completed',delivered:'os-delivered'};
const STEPS=[{id:'new',n:'Order Received',d:'Payment confirmed and brief sent to designer'},{id:'working',n:'Design in Progress',d:'Your designer is creating concepts'},{id:'review',n:'Ready for Review',d:'Drafts ready — provide your feedback'},{id:'revision',n:'Applying Revisions',d:'Refining based on your feedback'},{id:'completed',n:'Design Completed',d:'All work finalized and approved'},{id:'delivered',n:'Files Delivered',d:'Final files sent to you'}];

let sb=null,email=null,orders=[],selOrder=null,curTab='overview',msgs=[],deadlineTimer=null;
let replyToMsg=null,editingMsg=null,isRecording=false,recordSec=0,recordTimer=null,mediaRec=null,recChunks=[];
let adminOnline=false,adminLastSeen=null,remoteTyping=false,typingTimeout=null;
let adminProfileData={display_name:'Dean Designers',avatar_url:'',bio:'',status:'available'};
let myProfile={display_name:'',avatar_url:'',bio:''};
let currentNav='overview',drawerOpen=false;

// Security: rate limiting, session timeout, input validation
let lastMsgTime=0;
const MSG_COOLDOWN=1000;
const MAX_MSG_LEN=50000;
const MAX_FILE_SIZE=50*1024*1024;
function canSendMsg(){const now=Date.now();if(now-lastMsgTime<MSG_COOLDOWN)return false;lastMsgTime=now;return true}

// Login attempt limiting
const LF_KEY='dd_login_fails';
function getLoginFails(){try{const d=JSON.parse(localStorage.getItem(LF_KEY)||'{}');if(d.lockUntil&&Date.now()>=d.lockUntil){localStorage.removeItem(LF_KEY);return{count:0}}return d}catch(e){return{count:0}}}
function addLoginFail(){const d=getLoginFails();d.count=(d.count||0)+1;if(d.count>=8)d.lockUntil=Date.now()+300000;localStorage.setItem(LF_KEY,JSON.stringify(d))}
function clearLoginFails(){localStorage.removeItem(LF_KEY)}

// Session timeout (2 hours for customers)
const CUST_TIMEOUT=7200000;
function checkCustSession(){const t=localStorage.getItem('dd_cust_time');if(t&&Date.now()-parseInt(t)>CUST_TIMEOUT){localStorage.removeItem(SK);localStorage.removeItem('dd_cust_time');location.reload();return false}localStorage.setItem('dd_cust_time',String(Date.now()));return true}
setInterval(()=>{if(email)checkCustSession()},60000);

function waitSB(){return new Promise((r,j)=>{const s=Date.now();(function c(){window.supabase&&window.supabase.createClient?r():Date.now()-s>10000?j(new Error('Load failed')):setTimeout(c,100)})()})}

async function init(){
  try{await waitSB();sb=window.supabase.createClient(SB_URL,SB_KEY)}catch(e){document.getElementById('root').innerHTML='<div class="empty"><h3>Failed to load</h3><p>'+e.message+'</p></div>';return}
  const p=new URLSearchParams(location.search);
  const ue=p.get('email');
  let se=null;try{se=localStorage.getItem(SK)}catch{}
  email=ue||se;
  if(email){try{localStorage.setItem(SK,email)}catch{};loadOrders()}else renderLogin();
}

function renderLogin(){
  document.getElementById('root').innerHTML='<div class="login"><div class="login-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><h1>Track Your Order</h1><div class="login-sub">Enter the email you used when placing your order.</div><input class="login-input" id="em" type="email" placeholder="you@example.com" onkeydown="if(event.key===\'Enter\')doLogin()"/><button class="login-btn" id="lb" onclick="doLogin()">View My Orders</button><div class="login-error" id="le"></div><div class="login-note">Your email is your access key — no password needed.</div></div>';
  setTimeout(()=>{const e=document.getElementById('em');if(e)e.focus()},100);
}

async function doLogin(){
  const v=document.getElementById('em').value.trim().toLowerCase(),er=document.getElementById('le'),b=document.getElementById('lb');
  const fails=getLoginFails();
  if(fails.lockUntil&&Date.now()<fails.lockUntil){er.textContent='Too many attempts. Try again in 5 minutes.';er.style.display='block';return}
  if(!v){er.textContent='Please enter your email';er.style.display='block';return}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)){er.textContent='Invalid email format';er.style.display='block';return}
  er.style.display='none';b.disabled=true;b.textContent='Checking...';
  const{data,error}=await sb.from('orders').select('id').ilike('email',v).limit(1);
  if(error||!data||!data.length){addLoginFail();er.textContent='No orders found for this email.';er.style.display='block';b.disabled=false;b.textContent='View My Orders';return}
  clearLoginFails();email=v;try{localStorage.setItem(SK,v);localStorage.setItem('dd_cust_time',String(Date.now()))}catch{};loadOrders();
}

async function loadOrders(){
  document.getElementById('root').innerHTML='<div class="loading"><div class="spinner"></div> Loading your orders...</div>';
  renderSidebar();
  const{data,error}=await sb.from('orders').select('*').ilike('email',email).order('created_at',{ascending:false});
  if(error){document.getElementById('root').innerHTML='<div class="empty"><h3>Error</h3><p>'+error.message+'</p></div>';return}
  orders=data||[];
  if(!orders.length){document.getElementById('root').innerHTML='<div style="text-align:center;padding:80px 20px;animation:fadeUp .3s"><div style="width:72px;height:72px;background:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div><h3 style="font-size:18px;font-weight:800;margin-bottom:6px">You don\'t have any active orders</h3><p style="font-size:14px;color:var(--txt2);max-width:360px;margin:0 auto 24px;line-height:1.6">Once you place an order on our website, it will appear here with real-time status tracking and direct chat with your designer.</p><a href="/" style="display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:var(--green);color:#fff;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none;transition:background .15s">Browse Services & Order Now <span style="font-size:18px">→</span></a></div>';return}
  selOrder=orders[0];curTab='overview';
  renderDashboard();loadMyProfile();
  // Realtime subscriptions
  try{
    sb.channel('rt-orders-'+Date.now()).on('postgres_changes',{event:'*',schema:'public',table:'orders'},()=>loadOrders()).subscribe();
    sb.channel('rt-msgs-'+Date.now()).on('postgres_changes',{event:'*',schema:'public',table:'messages'},(payload)=>{
      if(!payload.new&&!payload.old)return;
      const msg=payload.new||payload.old;
      if(msg.order_email!==email)return;
      
      if(payload.eventType==='INSERT'){
        // Skip our own optimistic messages already in array
        if(msgs.find(function(x){return x.id===msg.id})) return;
        // Skip our own sent messages (already added optimistically)
        if(msg.sender_type==='client') return;
        // New admin message
        if(msg.sender_type==='admin'){
          playReceiveSound();
          if(document.hidden&&'Notification' in window&&Notification.permission==='granted'){
            new Notification('Dean Designers',{body:msg.voice_url?'Sent a voice message':msg.image_url?'Sent an image':msg.message||'New message',icon:'/favicon.png'});
          }
        }
        // Append without full reload
        msgs.push(msg);
        if(curTab==='chat'){
          var oldInp=document.getElementById('ci');
          var savedTxt=oldInp?oldInp.value:'';
          appendChatBubble(msg);
          if(oldInp&&savedTxt)oldInp.value=savedTxt;
          setTimeout(function(){var cb=document.getElementById('chat-msgs');if(cb)cb.scrollTop=cb.scrollHeight;},50);
        }
      } else if(payload.eventType==='UPDATE'){
        // Update in local array only
        var idx=msgs.findIndex(function(m){return m.id===msg.id});
        if(idx>-1) msgs[idx]=msg;
        if(curTab==='chat') renderChat();
      } else if(payload.eventType==='DELETE'){
        msgs=msgs.filter(function(m){return m.id!==(payload.old&&payload.old.id)});
        if(curTab==='chat') renderChat();

function calcDeadline(o){
  let target=o.deadline_at?new Date(o.deadline_at):null;
  if(!target&&o.delivery){const d=parseInt(o.delivery)||3;target=new Date(new Date(o.created_at).getTime()+d*86400000)}
  if(!target)return'<span class="dl-done">No deadline set</span>';
  if(['completed','delivered'].includes(o.status))return'<span class="dl-done">✓ Delivered</span>';
  const diff=target-Date.now();
  if(diff<=0)return'<span class="dl-done" style="color:var(--red)">Overdue</span>';
  return fmtCountdown(diff,target);
}

function fmtCountdown(diff){
  const d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000);
  let cls=d<1?'dl-urgent':d<2?'dl-warning':'';
  return '<div class="dl-timer '+cls+'"><div class="dl-block"><div class="dl-num">'+d+'</div><div class="dl-unit">Days</div></div><div class="dl-block"><div class="dl-num">'+h+'</div><div class="dl-unit">Hrs</div></div><div class="dl-block"><div class="dl-num">'+m+'</div><div class="dl-unit">Min</div></div></div>';
}

function startDeadlineTimer(o){
  if(deadlineTimer)clearInterval(deadlineTimer);
  deadlineTimer=setInterval(()=>{const el=document.getElementById('dl-timer');if(el)el.innerHTML=calcDeadline(o);else clearInterval(deadlineTimer)},60000);
}

async function saveBrief(status){
  var brand=document.getElementById('bf-brand');
  var desc=document.getElementById('bf-desc');
  if(!brand||!desc)return;
  if(!brand.value.trim()){alert('Brand name is required');return}
  if(status==='submitted'&&!desc.value.trim()){alert('Description is required');return}
  var payload={
    order_email:email,
    order_id:selOrder?selOrder.id:null,
    brand_name:brand.value.trim(),
    service_type:document.getElementById('bf-service').value,
    description:desc.value.trim(),
    color_references:(document.getElementById('bf-colors')||{}).value||'',
    target_audience:(document.getElementById('bf-audience')||{}).value||'',
    notes:(document.getElementById('bf-notes')||{}).value||'',
    status:status,
    updated_at:new Date().toISOString()
  };
  // Check if brief exists
  var{data}=await sb.from('briefs').select('id').eq('order_email',email).limit(1);
  if(data&&data[0]){
    await sb.from('briefs').update(payload).eq('id',data[0].id);
  }else{
    await sb.from('briefs').insert([payload]);
  }
  if(status==='submitted'){
    alert('✅ Brief submitted to designer!');
  }else{
    alert('💾 Draft saved!');
  }
  renderBrief();
}

      msgs[idx2]=data[0];
      // Update bubble DOM - remove sending state
      var tempEl=document.getElementById('msg-'+tempId);

function switchNav(v){
  currentNav=v;
  if(v==='chat'){curTab='chat';loadChat()}
  else if(v==='brief'){curTab='brief';renderDashboard()}
  else{curTab='overview';renderDashboard()}
  renderSidebar();
}
function toggleDrawer(){
  drawerOpen=!drawerOpen;
  const d=document.getElementById('m-drawer');
  if(d)d.classList.toggle('open',drawerOpen);
}

// ── Profile System ──
async function loadMyProfile(){
  if(!sb||!email)return;
  var{data}=await sb.from('user_profiles').select('*').eq('email',email).limit(1);
  if(data&&data[0]){myProfile=data[0]}
  updateTopbarAvatar();
}
function updateTopbarAvatar(){
  var el=document.getElementById('tb-profile');if(!el)return;
  if(myProfile.avatar_url){el.innerHTML='<img src="'+myProfile.avatar_url+'" alt=""/>'
  }else{el.textContent=(myProfile.display_name||email||'?').charAt(0).toUpperCase()}
}
async function openProfileModal(){
  // Always reload from DB before showing
  if(sb&&email){var{data}=await sb.from('user_profiles').select('*').eq('email',email).limit(1);if(data&&data[0])myProfile=data[0];else myProfile={display_name:'',avatar_url:'',bio:''}}
  updateTopbarAvatar();
  var av=myProfile.avatar_url;
  var initials=(myProfile.display_name||email||'?').charAt(0).toUpperCase();
  var h='<div class="profile-modal-bg" onclick="if(event.target===this)closeProfileModal()"><div class="profile-modal"><div class="profile-modal-head"><h3>Edit Profile</h3><button class="profile-modal-close" onclick="closeProfileModal()">×</button></div><div class="profile-modal-body">';
  h+='<div class="profile-avatar-wrap"><label class="profile-avatar" title="Change photo"><input type="file" accept="image/*" style="display:none" onchange="uploadProfileAvatar(this)"/>'+(av?'<img src="'+av+'" alt=""/>':''+initials+'')+'<div class="profile-avatar-overlay"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div></label></div>';
  h+='<div class="profile-field"><div class="profile-label">Display Name</div><input class="profile-input" id="pf-name" value="'+esc(myProfile.display_name||'')+'" placeholder="Your name or brand" maxlength="50"/></div>';
  h+='<div class="profile-field"><div class="profile-label">Bio</div><textarea class="profile-textarea" id="pf-bio" placeholder="Tell us about yourself..." maxlength="200">'+esc(myProfile.bio||'')+'</textarea></div>';
  h+='<button class="profile-save" id="pf-save" onclick="saveProfile()">Save Profile</button>';
  h+='<div class="profile-hint">Editing profile for: '+esc(email)+'</div>';
  h+='</div></div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
}
function closeProfileModal(){var m=document.querySelector('.profile-modal-bg');if(m)m.remove()}
async function saveProfile(){
  var name=(document.getElementById('pf-name').value||'').trim();
  var bio=(document.getElementById('pf-bio').value||'').trim();
  var btn=document.getElementById('pf-save');if(btn){btn.disabled=true;btn.textContent='Saving...'}
  await sb.from('user_profiles').upsert({email:email,display_name:name,bio:bio,avatar_url:myProfile.avatar_url||'',user_type:'client'},{onConflict:'email'});
  myProfile.display_name=name;myProfile.bio=bio;
  updateTopbarAvatar();closeProfileModal();
}
async function uploadProfileAvatar(input){
  var file=input.files&&input.files[0];if(!file||!sb)return;
  if(file.size>5*1024*1024){alert('Image too large. Max 5MB.');return}
  var ext=file.name.split('.').pop()||'jpg';
  var path='avatars/'+email.replace(/[^a-z0-9]/gi,'_')+'_'+Date.now()+'.'+ext;
  var{error}=await sb.storage.from('uploads').upload(path,file);
  if(error){alert('Upload failed');return}
  var{data}=sb.storage.from('uploads').getPublicUrl(path);
  if(!data||!data.publicUrl)return;
  myProfile.avatar_url=data.publicUrl;
  await sb.from('user_profiles').upsert({email:email,avatar_url:data.publicUrl,display_name:myProfile.display_name||'',bio:myProfile.bio||'',user_type:'client'},{onConflict:'email'});
  closeProfileModal();openProfileModal();updateTopbarAvatar();
}

// Presence cleanup
window.addEventListener('beforeunload',function(){if(sb&&email)sb.from('user_presence').upsert({email:email,is_online:false,last_seen:new Date().toISOString(),user_type:'client'},{onConflict:'email'}).then(()=>{})});
document.addEventListener('visibilitychange',function(){if(sb&&email)sb.from('user_presence').upsert({email:email,is_online:!document.hidden,last_seen:new Date().toISOString(),user_type:'client'},{onConflict:'email'}).then(()=>{})});
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
