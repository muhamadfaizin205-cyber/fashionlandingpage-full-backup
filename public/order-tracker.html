<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Orders · Dean Designers</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--green:#1DBF73;--green-dark:#19A463;--green-bg:rgba(29,191,115,0.08);--green-border:rgba(29,191,115,0.2);--bg:#F7F8FA;--card:#fff;--txt:#222325;--txt2:#62646A;--txt3:#95979D;--border:#E4E5E7;--border-light:#F0F1F3;--shadow:0 2px 12px rgba(0,0,0,0.06);--blue:#446EE7;--yellow:#FFB33E;--red:#FF5A5F;--purple:#8E63F4}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;font-size:14px;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.login-card{max-width:400px;width:100%;background:var(--card);border-radius:18px;padding:36px 28px;box-shadow:0 8px 32px rgba(0,0,0,0.08)}
.login-logo{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 6px 16px rgba(29,191,115,0.25);overflow:hidden}
.login-logo img{width:100%;height:100%;object-fit:cover}
.login-card h1{font-size:22px;font-weight:800;text-align:center;margin-bottom:4px}
.login-card .sub{font-size:13px;color:var(--txt2);text-align:center;margin-bottom:24px}
.login-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-size:14px;outline:none;color:var(--txt);font-family:inherit;margin-bottom:10px;transition:border .15s}
.login-input:focus{border-color:var(--green)}
.login-btn{width:100%;background:var(--green);color:#fff;border-radius:10px;padding:14px;font-size:14px;font-weight:700;margin-top:4px;transition:background .15s}
.login-btn:hover{background:var(--green-dark)}
.login-error{background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:8px 12px;font-size:12px;color:#DC2626;margin-top:10px;display:none}

/* Layout */
.app{display:flex;min-height:100vh;background:linear-gradient(135deg,#E8F5E9 0%,#F1F8E9 30%,#E0F2F1 60%,#F1F8E9 100%)}
.sidebar{width:72px;background:rgba(255,255,255,0.85);backdrop-filter:blur(16px);border-right:1px solid rgba(0,0,0,0.05);display:flex;flex-direction:column;align-items:center;padding:16px 0;flex-shrink:0;position:sticky;top:0;height:100vh;z-index:10}
.sb-logo{width:40px;height:40px;border-radius:12px;overflow:hidden;margin-bottom:24px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.sb-logo img{width:100%;height:100%}
.sb-nav{display:flex;flex-direction:column;gap:6px;width:100%;padding:0 8px}
.sb-ic{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:10px 4px;border-radius:10px;font-size:9px;font-weight:600;color:var(--txt3);gap:3px;transition:all .15s;position:relative}
.sb-ic:hover{background:var(--green-bg);color:var(--green)}
.sb-ic.active{background:var(--green-bg);color:var(--green)}
.sb-ic-tip{position:absolute;left:calc(100% + 12px);top:50%;transform:translateY(-50%);background:var(--txt);color:#fff;padding:5px 10px;border-radius:6px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s}
.sb-ic:hover .sb-ic-tip{opacity:1}
.sb-bottom{margin-top:auto;display:flex;flex-direction:column;gap:8px;align-items:center;padding:0 8px 8px}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.main-scroll{flex:1;overflow-y:auto;padding:24px}
.page-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-title{font-size:22px;font-weight:800;letter-spacing:-0.3px}
.page-actions{display:flex;gap:8px}
.btn-primary{background:var(--green);color:#fff;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;transition:background .15s}
.btn-primary:hover{background:var(--green-dark)}
.btn-ghost{border:1.5px solid var(--border);border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;color:var(--txt2);transition:all .15s}
.btn-ghost:hover{border-color:var(--green);color:var(--green)}

/* Order Cards */
.order-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.order-card{background:var(--card);border-radius:14px;padding:18px;box-shadow:var(--shadow);border:1px solid var(--border-light);transition:transform .15s,box-shadow .15s}
.order-card:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.oc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.oc-badge{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.oc-badge.pending{background:#FEF3C7;color:#D97706}
.oc-badge.processing,.oc-badge.in_progress{background:#DBEAFE;color:#2563EB}
.oc-badge.completed,.oc-badge.delivered{background:#D1FAE5;color:#059669}
.oc-badge.cancelled{background:#FEE2E2;color:#DC2626}
.oc-service{font-size:13px;font-weight:700;color:var(--txt)}
.oc-row{display:flex;gap:12px;font-size:12px;color:var(--txt3);margin-bottom:6px;flex-wrap:wrap}
.oc-row strong{color:var(--txt2)}
.oc-brief{font-size:12px;color:var(--txt2);background:var(--bg);padding:8px 12px;border-radius:8px;margin-top:8px;line-height:1.5}

/* Chat Panel */
.chat-panel{width:380px;background:rgba(255,255,255,0.9);backdrop-filter:blur(16px);border-left:1px solid rgba(0,0,0,0.05);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;flex-shrink:0}
.chat-head{padding:16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:10px}
.chat-avatar{width:36px;height:36px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;overflow:hidden}
.chat-avatar img{width:100%;height:100%;object-fit:cover}
.chat-name{font-size:14px;font-weight:700}
.chat-status{font-size:11px;color:var(--txt3)}
.chat-online{color:var(--green)}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.chat-bubble{max-width:80%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word}
.chat-bubble.me{background:var(--green);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-bubble.them{background:var(--card);border:1px solid var(--border-light);align-self:flex-start;border-bottom-left-radius:4px}
.chat-time{font-size:10px;color:var(--txt3);margin-top:2px}
.chat-input-area{padding:12px 16px;border-top:1px solid var(--border-light);display:flex;gap:8px;align-items:center}
.chat-input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;outline:none;font-family:inherit;resize:none}
.chat-input:focus{border-color:var(--green)}
.chat-send{width:36px;height:36px;border-radius:10px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-send:hover{background:var(--green-dark)}
.chat-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--txt3);font-size:13px;text-align:center;padding:20px}

/* Mobile */
@media(max-width:768px){
  .sidebar{display:none}
  .chat-panel{display:none}
  .chat-panel.mobile-show{display:flex;position:fixed;inset:0;width:100%;z-index:100}
  .mobile-bar{display:flex !important;position:fixed;top:0;left:0;right:0;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);padding:10px 16px;z-index:50;border-bottom:1px solid var(--border-light);justify-content:space-between;align-items:center}
  .main-scroll{padding:68px 16px 16px}
  .order-grid{grid-template-columns:1fr}
}
.mobile-bar{display:none}
.mob-tab{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;color:var(--txt3)}
.mob-tab.active{background:var(--green-bg);color:var(--green)}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SB_URL='https://zqawpdspxdcmofnmrbku.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxYXdwZHNweGRjbW9mbm1yYmt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTE0MTYsImV4cCI6MjA5NzI2NzQxNn0.TiAl-MUk1rxxMRTf2Gs8ZjCFgDJiDzWezxQKoPWZbIw';
const WA='628986737474';
let sb=null, customerEmail='', currentView='orders', messages=[], orders=[], chatChannel=null;

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

// ── Check saved session ──
const saved=localStorage.getItem('dd_customer_email');
if(saved){customerEmail=saved;init();}
else{showLogin();}

function showLogin(){
  // Check URL param
  const params=new URLSearchParams(window.location.search);
  const emailParam=params.get('email');
  document.getElementById('root').innerHTML=
    '<div class="login-wrap"><div class="login-card">'+
    '<div class="login-logo"><img src="/favicon-96x96.png" alt="DD"></div>'+
    '<h1>Track Your Order</h1>'+
    '<p class="sub">Enter the email you used when ordering</p>'+
    '<input class="login-input" id="em" type="email" placeholder="your@email.com" value="'+(emailParam?esc(emailParam):'')+'" onkeydown="if(event.key===\'Enter\')doLogin()">'+
    '<button class="login-btn" onclick="doLogin()">Sign In</button>'+
    '<div class="login-error" id="le"></div>'+
    '</div></div>';
  if(emailParam)setTimeout(doLogin,300);
}

async function doLogin(){
  const em=document.getElementById('em').value.trim().toLowerCase();
  const le=document.getElementById('le');
  if(!em||!em.includes('@')){le.textContent='Enter a valid email';le.style.display='block';return;}
  le.style.display='none';
  try{
    const res=await fetch('/api/get-orders?email='+encodeURIComponent(em));
    const data=await res.json();
    if(data.success&&data.orders&&data.orders.length>0){
      customerEmail=em;
      localStorage.setItem('dd_customer_email',em);
      orders=data.orders;
      init();
    }else{
      le.textContent='No orders found for this email.';le.style.display='block';
    }
  }catch(e){le.textContent='Network error. Try again.';le.style.display='block';}
}

function init(){
  sb=window.supabase.createClient(SB_URL,SB_KEY);
  renderApp();
  loadOrders();
  loadMessages();
  setupRealtime();
  // Presence
  setInterval(()=>{if(sb&&!document.hidden)sb.from('user_presence').upsert({email:customerEmail,is_online:true,last_seen:new Date().toISOString(),user_type:'customer'},{onConflict:'email'}).then(()=>{})},30000);
}

async function loadOrders(){
  const res=await fetch('/api/get-orders?email='+encodeURIComponent(customerEmail));
  const data=await res.json();
  if(data.success)orders=data.orders||[];
  renderOrders();
}

async function loadMessages(){
  if(!sb)return;
  const{data}=await sb.from('messages').select('*').eq('order_email',customerEmail).order('created_at',{ascending:true}).limit(200);
  if(data)messages=data;
  renderMessages();
}

function setupRealtime(){
  if(!sb||chatChannel)return;
  chatChannel=sb.channel('customer-chat:'+customerEmail)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'order_email=eq.'+customerEmail},p=>{
      messages.push(p.new);renderMessages();scrollChat();
    })
    .subscribe();
}

async function sendMessage(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  await fetch('/api/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-user-email':customerEmail},
    body:JSON.stringify({order_email:customerEmail,sender_email:customerEmail,text:text})
  });
}

function switchView(v){currentView=v;renderContent();
  // Mobile tab highlight
  document.querySelectorAll('.mob-tab').forEach(t=>t.classList.remove('active'));
  const active=document.querySelector('[data-view="'+v+'"]');
  if(active)active.classList.add('active');
  // Show/hide chat on mobile
  const cp=document.querySelector('.chat-panel');
  if(cp){if(v==='chat')cp.classList.add('mobile-show');else cp.classList.remove('mobile-show');}
}

function logout(){
  localStorage.removeItem('dd_customer_email');customerEmail='';orders=[];messages=[];
  if(chatChannel){chatChannel.unsubscribe();chatChannel=null;}
  showLogin();
}

function renderApp(){
  document.getElementById('root').innerHTML=
    '<div class="app">'+
    // Sidebar
    '<div class="sidebar">'+
      '<div class="sb-logo"><img src="/favicon-96x96.png" alt="DD"></div>'+
      '<div class="sb-nav">'+
        '<button class="sb-ic '+(currentView==='orders'?'active':'')+'" onclick="switchView(\'orders\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>Orders<span class="sb-ic-tip">My Orders</span></button>'+
        '<button class="sb-ic '+(currentView==='chat'?'active':'')+'" onclick="switchView(\'chat\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chat<span class="sb-ic-tip">Chat with Designer</span></button>'+
      '</div>'+
      '<div class="sb-bottom">'+
        '<button class="sb-ic" onclick="window.open(\'https://wa.me/'+WA+'\',\'_blank\')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>Call<span class="sb-ic-tip">WhatsApp</span></button>'+
        '<button class="sb-ic" onclick="logout()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Out<span class="sb-ic-tip">Sign Out</span></button>'+
      '</div>'+
    '</div>'+
    // Mobile bar
    '<div class="mobile-bar">'+
      '<div style="display:flex;gap:4px">'+
        '<button class="mob-tab active" data-view="orders" onclick="switchView(\'orders\')">📦 Orders</button>'+
        '<button class="mob-tab" data-view="chat" onclick="switchView(\'chat\')">💬 Chat</button>'+
      '</div>'+
      '<div style="display:flex;gap:8px;align-items:center">'+
        '<button onclick="window.open(\'https://wa.me/'+WA+'\',\'_blank\')" style="font-size:12px;color:var(--green);font-weight:600">📞 Call</button>'+
        '<button onclick="logout()" style="font-size:12px;color:var(--txt3)">Sign Out</button>'+
      '</div>'+
    '</div>'+
    // Main
    '<div class="main"><div class="main-scroll" id="content"></div></div>'+
    // Chat panel
    '<div class="chat-panel">'+
      '<div class="chat-head">'+
        '<div class="chat-avatar"><img src="/favicon-96x96.png" alt="DD"></div>'+
        '<div><div class="chat-name">Dean Designers</div><div class="chat-status" id="admin-status">Online</div></div>'+
      '</div>'+
      '<div class="chat-msgs" id="chat-msgs"></div>'+
      '<div class="chat-input-area">'+
        '<textarea class="chat-input" id="chat-input" rows="1" placeholder="Type a message..." onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>'+
        '<button class="chat-send" onclick="sendMessage()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>'+
      '</div>'+
    '</div>'+
    '</div>';
  renderContent();
  renderMessages();
}

function renderContent(){
  const el=document.getElementById('content');
  if(!el)return;
  if(currentView==='orders'){
    el.innerHTML='<div class="page-head"><h1 class="page-title">My Orders</h1><div style="font-size:12px;color:var(--txt3)">'+esc(customerEmail)+'</div></div><div class="order-grid" id="order-grid"></div>';
    renderOrders();
  }else if(currentView==='chat'){
    el.innerHTML='<div class="page-head"><h1 class="page-title">Chat with Designer</h1></div><p style="color:var(--txt3);font-size:13px">Use the chat panel on the right to message Dean Designers directly. On mobile, the chat opens fullscreen.</p>';
    // Mobile: show chat panel
    const cp=document.querySelector('.chat-panel');
    if(cp&&window.innerWidth<=768)cp.classList.add('mobile-show');
  }
}

function renderOrders(){
  const el=document.getElementById('order-grid');
  if(!el)return;
  if(orders.length===0){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--txt3)"><p>No orders yet.</p></div>';return;}
  el.innerHTML=orders.map(o=>{
    const s=o.status||'pending';
    return '<div class="order-card">'+
      '<div class="oc-head">'+
        '<span class="oc-service">'+(o.service==='logo'?'🎨 Logo Design':'👕 Clothing Design')+'</span>'+
        '<span class="oc-badge '+s+'">'+s.replace('_',' ')+'</span>'+
      '</div>'+
      '<div class="oc-row"><strong>Brand:</strong> '+esc(o.brand_name||'-')+'</div>'+
      '<div class="oc-row">'+
        '<span><strong>Package:</strong> '+(esc(o.package_name||o.badge||'-'))+'</span>'+
        '<span><strong>Qty:</strong> '+(o.qty||1)+'</span>'+
        '<span><strong>Total:</strong> $'+Number(o.total_price||o.price||0).toFixed(2)+'</span>'+
      '</div>'+
      '<div class="oc-row"><strong>Date:</strong> '+new Date(o.created_at).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})+'</div>'+
      (o.brief?'<div class="oc-brief">'+esc(o.brief).substring(0,200)+(o.brief.length>200?'...':'')+'</div>':'')+
    '</div>';
  }).join('');
}

function renderMessages(){
  const el=document.getElementById('chat-msgs');
  if(!el)return;
  if(messages.length===0){el.innerHTML='<div class="chat-empty">No messages yet. Say hi! 👋</div>';return;}
  el.innerHTML=messages.map(m=>{
    const isMe=m.sender_email===customerEmail;
    const time=new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    return '<div style="display:flex;flex-direction:column;align-items:'+(isMe?'flex-end':'flex-start')+'">'+
      '<div class="chat-bubble '+(isMe?'me':'them')+'">'+esc(m.text)+(m.image_url?'<br><img src="'+esc(m.image_url)+'" style="max-width:200px;border-radius:8px;margin-top:6px">':'')+'</div>'+
      '<div class="chat-time">'+time+'</div>'+
    '</div>';
  }).join('');
  scrollChat();
}

function scrollChat(){
  const el=document.getElementById('chat-msgs');
  if(el)setTimeout(()=>el.scrollTop=el.scrollHeight,50);
}

// Mark messages as read
setInterval(()=>{
  if(!sb||!customerEmail)return;
  const unread=messages.filter(m=>m.sender_email!==customerEmail&&!m.is_read);
  if(unread.length>0){
    fetch('/api/messages',{
      method:'PATCH',
      headers:{'Content-Type':'application/json','x-user-email':customerEmail},
      body:JSON.stringify({action:'mark-read',order_email:customerEmail,reader:customerEmail})
    });
  }
},5000);
</script>
</body>
</html>
