<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Orders · Dean Designers</title>
<link rel="icon" href="/favicon-96x96.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#1DBF73;--gd:#17B169;--bg:#0B0F19;--card:rgba(255,255,255,0.04);--txt:#F1F5F9;--txt2:#94A3B8;--txt3:#64748B;--border:rgba(255,255,255,0.08)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* Login */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.login::before{content:'';position:absolute;top:15%;left:25%;width:400px;height:400px;background:radial-gradient(circle,rgba(29,191,115,0.12),transparent 70%);border-radius:50%}
.login::after{content:'';position:absolute;bottom:15%;right:20%;width:300px;height:300px;background:radial-gradient(circle,rgba(167,139,250,0.08),transparent 70%);border-radius:50%}
.login-card{max-width:380px;width:100%;background:rgba(255,255,255,0.04);backdrop-filter:blur(24px);border-radius:24px;padding:40px 32px;border:1px solid var(--border);position:relative;z-index:1;text-align:center}
.login-card img{width:56px;height:56px;border-radius:16px;margin-bottom:16px}
.login-card h1{font-size:20px;font-weight:800;margin-bottom:4px}
.login-card p{font-size:13px;color:var(--txt2);margin-bottom:24px}
.login-card input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;background:rgba(255,255,255,0.04);color:var(--txt);outline:none;font-family:inherit;margin-bottom:12px}
.login-card input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(29,191,115,0.15)}
.login-card button{width:100%;padding:14px;background:linear-gradient(135deg,#1DBF73,#059669);color:#fff;border-radius:12px;font-size:14px;font-weight:700}
.login-card button:hover{opacity:.9}
.login-err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:8px 12px;font-size:12px;color:#F87171;margin-top:10px;display:none}

/* App Layout */
.app{display:flex;min-height:100vh}
.side{width:72px;background:rgba(255,255,255,0.03);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:16px 0;position:fixed;top:0;bottom:0;z-index:10}
.side-logo{width:40px;height:40px;border-radius:12px;overflow:hidden;margin-bottom:24px}
.side-logo img{width:100%;height:100%}
.side-nav{display:flex;flex-direction:column;gap:6px;width:100%;padding:0 10px}
.side-btn{width:100%;padding:10px 0;border-radius:10px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;font-weight:600;color:var(--txt3);transition:all .15s}
.side-btn:hover{background:rgba(29,191,115,0.08);color:var(--txt)}
.side-btn.active{background:rgba(29,191,115,0.12);color:var(--g)}
.side-btn svg{width:20px;height:20px}
.side-bottom{margin-top:auto;padding:0 10px 16px;width:100%}

/* Main */
.main{flex:1;margin-left:72px;display:flex;flex-direction:column}
.main-content{flex:1;padding:24px;overflow-y:auto}
.main-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.main-title{font-size:24px;font-weight:800;letter-spacing:-.5px}
.main-email{font-size:12px;color:var(--txt3)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.stat-n{font-size:22px;font-weight:800;margin-bottom:2px}
.stat-n.green{color:var(--g)}
.stat-l{font-size:11px;color:var(--txt3)}

/* Order Cards */
.orders{display:flex;flex-direction:column;gap:10px}
.ocard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;transition:all .15s;cursor:pointer}
.ocard:hover{border-color:rgba(29,191,115,0.3);background:rgba(255,255,255,0.06)}
.ocard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ocard-service{font-size:14px;font-weight:700}
.badge{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase}
.b-new,.b-pending{background:rgba(251,191,36,0.1);color:#FBBF24}
.b-working,.b-processing,.b-in_progress{background:rgba(96,165,250,0.1);color:#60A5FA}
.b-completed,.b-delivered{background:rgba(29,191,115,0.1);color:#1DBF73}
.b-cancelled{background:rgba(248,113,113,0.1);color:#F87171}
.ocard-row{display:flex;gap:12px;font-size:12px;color:var(--txt2);flex-wrap:wrap}
.ocard-brief{font-size:12px;color:var(--txt2);background:rgba(255,255,255,0.03);padding:8px 12px;border-radius:8px;margin-top:8px;line-height:1.5}

/* Chat Panel */
.chat{width:360px;background:rgba(15,23,42,0.98);backdrop-filter:blur(16px);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;right:0;top:0;bottom:0;z-index:5}
.chat-head{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.chat-av{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0}
.chat-av img{width:100%;height:100%}
.chat-name{font-size:14px;font-weight:700}
.chat-status{font-size:11px;color:var(--txt3)}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:6px}
.msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word}
.msg.me{background:var(--g);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.them{background:rgba(255,255,255,0.06);align-self:flex-start;border-bottom-left-radius:4px}
.msg-time{font-size:10px;color:var(--txt3);margin-top:2px}
.msg-img{max-width:200px;border-radius:8px;margin-bottom:4px}
.chat-input{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input textarea{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:12px;background:rgba(255,255,255,0.04);color:var(--txt);font-size:13px;font-family:inherit;outline:none;resize:none;min-height:38px}
.chat-input textarea:focus{border-color:var(--g)}
.chat-send{width:36px;height:36px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--txt3);font-size:13px}
.typing-dots span{animation:tdot 1.4s infinite;font-size:18px;font-weight:900;color:var(--g)}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{opacity:.2}30%{opacity:1}}

/* Desktop: main content needs right margin for chat */
@media(min-width:769px){
  .main{margin-right:360px}
}

/* Mobile */
.mob-bar{display:none;position:fixed;top:0;left:0;right:0;background:rgba(11,15,25,0.98);backdrop-filter:blur(12px);padding:12px 16px;z-index:50;border-bottom:1px solid var(--border);justify-content:space-between;align-items:center}
.mob-tab{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;color:var(--txt3)}
.mob-tab.active{background:rgba(29,191,115,0.1);color:var(--g)}
@media(max-width:768px){
  .side{display:none}
  .chat{display:none;width:100%;position:fixed;inset:0;z-index:100}
  .chat.show{display:flex}
  .main{margin-left:0;margin-right:0}
  .mob-bar{display:flex}
  .main-content{padding:64px 16px 16px}
  .stats{grid-template-columns:1fr 1fr}
  .ocard-row{flex-direction:column;gap:4px}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
var SB_URL='https://zqawpdspxdcmofnmrbku.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxYXdwZHNweGRjbW9mbm1yYmt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTE0MTYsImV4cCI6MjA5NzI2NzQxNn0.vRPaxLCPNPbNnHpsAClr_gr_pCpcbvBbDdAcEGhCT_E';
var sb=null,orders=[],messages=[],view='orders',chatCh=null;
var email=localStorage.getItem('dd_customer_email')||'';
var ep=new URLSearchParams(window.location.search).get('email');
if(ep){email=ep;localStorage.setItem('dd_customer_email',ep)}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

if(email)startApp();else showLogin();

function showLogin(){
  document.getElementById('root').innerHTML=
    '<div class="login"><div class="login-card">'+
    '<img src="/favicon-96x96.png" alt="DD">'+
    '<h1>Track Your Order</h1>'+
    '<p>Enter the email you used when ordering</p>'+
    '<input id="em" type="email" placeholder="your@email.com" onkeydown="if(event.key===\'Enter\')doLogin()">'+
    '<button onclick="doLogin()">Sign In</button>'+
    '<div class="login-err" id="err"></div>'+
    '</div></div>';
}

async function doLogin(){
  var e=document.getElementById('em').value.trim().toLowerCase();
  var err=document.getElementById('err');
  if(!e||!e.includes('@')){err.textContent='Enter a valid email';err.style.display='block';return}
  err.style.display='none';
  try{
    var r=await fetch('/api/get-orders?email='+encodeURIComponent(e));
    var d=await r.json();
    if(d.success&&d.orders&&d.orders.length>0){
      email=e;localStorage.setItem('dd_customer_email',e);
      orders=d.orders;startApp();
    }else{err.textContent='No orders found for this email.';err.style.display='block'}
  }catch(x){err.textContent='Network error.';err.style.display='block'}
}

function startApp(){
  sb=window.supabase.createClient(SB_URL,SB_KEY);
  renderApp();loadOrders();loadMessages();setupRealtime();
  // Poll every 3s — guaranteed message delivery
  setInterval(pollMessages,3000);
  // Setup typing
  setupTypingListener();
}

async function pollMessages(){
  if(!email)return;
  try{
    var r=await fetch('/api/messages?email='+encodeURIComponent(email),{headers:{'x-user-email':email}});
    var d=await r.json();
    if(d.success&&d.messages){
      // Compare: if server has different count than local (excluding temp), update
      var realLocal=messages.filter(function(m){return !m.id||!String(m.id).startsWith('temp-')});
      if(d.messages.length!==realLocal.length){
        messages=d.messages;
        renderMessages();scrollChat();
      }
    }
  }catch(e){}
}

var isTyping=false,typingTimer=null,remoteTyping=false;
function handleTyping(){
  if(!sb||!email)return;
  if(!isTyping){isTyping=true;sb.channel('typing:'+email).send({type:'broadcast',event:'typing',payload:{who:'client',typing:true}})}
  clearTimeout(typingTimer);
  typingTimer=setTimeout(function(){isTyping=false;sb.channel('typing:'+email).send({type:'broadcast',event:'typing',payload:{who:'client',typing:false}})},2000);
}

function setupTypingListener(){
  if(!sb)return;
  sb.channel('typing:'+email).on('broadcast',{event:'typing'},function(p){
    if(p.payload&&p.payload.who==='admin'){
      remoteTyping=p.payload.typing;
      var el=document.getElementById('typing-ind');
      if(el)el.style.display=remoteTyping?'flex':'none';
    }
  }).subscribe();
}

async function loadOrders(){
  try{
    var r=await fetch('/api/get-orders?email='+encodeURIComponent(email));
    var d=await r.json();
    if(d.success)orders=d.orders||[];
  }catch(e){console.error('loadOrders error',e)}
  renderContent();
}

async function loadMessages(){
  if(!sb)return;
  var r=await sb.from('messages').select('*').eq('order_email',email).order('created_at',{ascending:true}).limit(200);
  if(r.data)messages=r.data;
  renderMessages();
}

function setupRealtime(){
  if(!sb||chatCh)return;
  chatCh=sb.channel('cust:'+email)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'order_email=eq.'+email},function(p){
      var m=p.new;
      // Skip if already in array (optimistic or duplicate)
      if(messages.find(function(x){return x.id===m.id}))return;
      // Replace temp message if it's our own
      var tempIdx=messages.findIndex(function(x){return x.id&&x.id.startsWith('temp-')&&x.message===m.message&&x.sender_email===m.sender_email});
      if(tempIdx>=0){messages[tempIdx]=m;}
      else{messages.push(m);}
      renderMessages();scrollChat();
    }).subscribe();
}

async function sendMsg(){
  var inp=document.getElementById('ci');
  var txt=inp.value.trim();if(!txt)return;inp.value='';
  // Optimistic: show message immediately
  var tempMsg={id:'temp-'+Date.now(),order_email:email,sender_email:email,sender_type:'client',message:txt,created_at:new Date().toISOString(),image_url:null};
  messages.push(tempMsg);
  renderMessages();scrollChat();
  // Send to server
  try{
    await fetch('/api/messages',{method:'POST',headers:{'Content-Type':'application/json','x-user-email':email},
      body:JSON.stringify({order_email:email,sender_email:email,message:txt})});
  }catch(e){console.error('sendMsg error',e)}
}

function switchView(v){view=v;renderContent();
  document.querySelectorAll('.side-btn').forEach(function(b){b.classList.toggle('active',b.dataset.v===v)});
  document.querySelectorAll('.mob-tab').forEach(function(b){b.classList.toggle('active',b.dataset.v===v)});
  var ch=document.querySelector('.chat');
  var back=document.querySelector('.chat-back');
  if(ch){
    if(v==='chat'){ch.classList.add('show');if(back)back.style.display='flex';scrollChat();}
    else{ch.classList.remove('show');if(back)back.style.display='none';}
  }
}

function logout(){localStorage.removeItem('dd_customer_email');email='';location.reload()}

function renderApp(){
  var SL={new:'New',pending:'Pending',working:'In Progress',in_progress:'In Progress',review:'Review',revision:'Revision',completed:'Completed',delivered:'Delivered',cancelled:'Cancelled'};
  window._SL=SL;
  document.getElementById('root').innerHTML=
    '<div class="app">'+
    '<div class="side">'+
      '<div class="side-logo"><img src="/favicon-96x96.png" alt="DD"></div>'+
      '<div class="side-nav">'+
        '<button class="side-btn active" data-v="orders" onclick="switchView(\'orders\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>Orders</button>'+
        '<button class="side-btn" data-v="chat" onclick="switchView(\'chat\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chat</button>'+
      '</div>'+
      '<div class="side-bottom">'+
        '<button class="side-btn" onclick="window.open(\'https://wa.me/628986737474\',\'_blank\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>Call</button>'+
        '<button class="side-btn" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Out</button>'+
      '</div>'+
    '</div>'+
    '<div class="mob-bar">'+
      '<div style="display:flex;gap:4px">'+
        '<button class="mob-tab active" data-v="orders" onclick="switchView(\'orders\')">📦 Orders</button>'+
        '<button class="mob-tab" data-v="chat" onclick="switchView(\'chat\')">💬 Chat</button>'+
      '</div>'+
      '<button onclick="logout()" style="font-size:12px;color:var(--txt3)">Sign Out</button>'+
    '</div>'+
    '<div class="main"><div class="main-content" id="content"></div></div>'+
    '<div class="chat">'+
      '<div class="chat-head"><button class="chat-back" onclick="switchView(\'orders\')" style="display:none;width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.06);align-items:center;justify-content:center;color:var(--txt2);margin-right:4px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button><div class="chat-av"><img src="/favicon-96x96.png" alt="DD"></div><div><div class="chat-name">Dean Designers</div><div class="chat-status">Designer</div></div></div>'+
      '<div class="chat-msgs" id="msgs"></div>'+
      '<div id="typing-ind" style="display:none;padding:4px 14px;font-size:11px;color:#64748B;align-items:center;gap:6px"><span class="typing-dots"><span>.</span><span>.</span><span>.</span></span> Designer is typing</div>'+
      '<div class="chat-input"><textarea id="ci" rows="1" placeholder="Type a message..." oninput="handleTyping()" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea><button class="chat-send" onclick="sendMsg()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div>'+
    '</div>'+
    '</div>';
  renderContent();renderMessages();setupTypingListener();
}

function renderContent(){
  var el=document.getElementById('content');if(!el)return;
  var t=orders.length,a=orders.filter(function(o){return o.status==='working'||o.status==='in_progress'||o.status==='review'}).length;
  var c=orders.filter(function(o){return o.status==='completed'||o.status==='delivered'}).length;
  var SL=window._SL;
  el.innerHTML=
    '<div class="main-header"><div><div class="main-title">My Orders</div><div class="main-email">'+esc(email)+'</div></div></div>'+
    '<div class="stats"><div class="stat"><div class="stat-n">'+t+'</div><div class="stat-l">Total Orders</div></div><div class="stat"><div class="stat-n green">'+a+'</div><div class="stat-l">In Progress</div></div><div class="stat"><div class="stat-n">'+c+'</div><div class="stat-l">Completed</div></div></div>'+
    '<div class="orders">'+orders.map(function(o){
      var s=o.status||'pending';
      return '<div class="ocard">'+
        '<div class="ocard-top"><span class="ocard-service">'+(o.service==='logo'?'🎨 Logo Design':'👕 Clothing Design')+'</span><span class="badge b-'+s+'">'+(SL[s]||s)+'</span></div>'+
        '<div class="ocard-row"><span><b>Brand:</b> '+esc(o.brand_name||'-')+'</span><span><b>Qty:</b> '+(o.qty||1)+'</span><span><b>Total:</b> $'+Number(o.total_price||o.price||0).toFixed(2)+'</span><span><b>Date:</b> '+new Date(o.created_at).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})+'</span></div>'+
        (o.brief?'<div class="ocard-brief">'+esc(o.brief).substring(0,200)+(o.brief.length>200?'...':'')+'</div>':'')+
      '</div>';
    }).join('')+'</div>';
}

function renderMessages(){
  var el=document.getElementById('msgs');if(!el)return;
  if(!messages.length){el.innerHTML='<div class="chat-empty">No messages yet. Say hi! 👋</div>';return}
  el.innerHTML=messages.map(function(m){
    var me=m.sender_email===email||m.sender_type==='client';
    var t=new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    var body=m.message||m.text||'';
    return '<div style="display:flex;flex-direction:column;align-items:'+(me?'flex-end':'flex-start')+'">'+
      (m.image_url?'<img class="msg-img" src="'+esc(m.image_url)+'">':'')+
      '<div class="msg '+(me?'me':'them')+'">'+esc(body)+'</div>'+
      '<div class="msg-time">'+t+'</div></div>';
  }).join('');
  scrollChat();
}
function scrollChat(){var el=document.getElementById('msgs');if(el)setTimeout(function(){el.scrollTop=el.scrollHeight},50)}
</script>
</body>
</html>
