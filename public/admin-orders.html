var enrichRunning=false;
var enrichStop=false;

function isAddressIncomplete(addr){
  if(!addr)return true;
  // Heuristic: a full street address usually has "Jl." or 4+ comma-separated parts (street, district, city, province...)
  var commaParts=addr.split(',').length;
  var hasJl=/\bjl\.?\b/i.test(addr);
  return !hasJl && commaParts<4;
}

async function enrichAllAddresses(){
  if(enrichRunning){
    enrichStop=true;
    return;
  }
  var targets=curHotels.filter(function(h){return isAddressIncomplete(h.address_raw)});
  if(!targets.length){
    alert('All addresses already look complete!');
    return;
  }
  if(!confirm('This will look up full addresses for '+targets.length+' properties using LocationIQ (about '+Math.ceil(targets.length/110)+' minutes). Continue?'))return;

  enrichRunning=true;
  enrichStop=false;
  var btn=document.getElementById('enrich-all-btn');
  if(btn){btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12"/></svg> Stop Enriching';btn.style.background='#FEF2F2';btn.style.color='#DC2626';btn.style.borderColor='#FECACA';}

  var statusEl=document.getElementById('hotel-enrich-status');
  var done=0,found=0,failed=0;

  function renderProgress(){
    if(!statusEl)return;
    var pct=Math.round(done/targets.length*100);
    statusEl.innerHTML='<div style="background:#EEF2FF;border:1px solid #C7D2FE;border-radius:12px;padding:14px 16px;margin-bottom:14px">'+
      '<div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:#4F46E5;margin-bottom:8px"><span>Enriching addresses... '+done+' / '+targets.length+'</span><span>'+found+' found, '+failed+' failed</span></div>'+
      '<div style="height:6px;background:#E0E7FF;border-radius:3px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:#6366F1;transition:width .3s"></div></div></div>';
  }
  renderProgress();

  for(var i=0;i<targets.length;i++){
    if(enrichStop)break;
    var ho=targets[i];
    try{
      var result=await geocodeQuery(ho.name+', Indonesia');
      if(isShortResult(result&&result.address)){
        var stripped=stripBrandKeywords(ho.name);
        if(stripped&&stripped.length>2){
          var alt=await geocodeQuery(stripped+', Indonesia');
          if(alt&&!isShortResult(alt.address))result=alt;
          else if(alt&&!result)result=alt;
        }
      }
      if(result&&result.address){
        await sb.from('hotels').update({address_raw:result.address,lat:result.lat,lon:result.lon,updated_at:new Date().toISOString()}).eq('id',ho.id);
        var idx=curHotels.findIndex(function(x){return x.id===ho.id});
        if(idx>-1){curHotels[idx].address_raw=result.address;curHotels[idx].lat=result.lat;curHotels[idx].lon=result.lon;}
        found++;
        // Live update: if this hotel is currently selected, refresh the preview panel immediately
        if(ho.id===selectedHotelId){
          var titleEl=document.getElementById('hotel-title-text');
          var descEl=document.getElementById('hotel-preview-text');
          var locEl=document.getElementById('hotel-location-block');
          var freshHotel=curHotels[idx];
          if(titleEl)titleEl.textContent=hotelDynamicTitle(freshHotel);
          if(descEl)descEl.textContent=hotelTemplate(freshHotel);
          if(locEl)locEl.outerHTML=renderHotelLocationBlock(freshHotel);
        }
      }else{
        failed++;
      }
    }catch(e){
      failed++;
    }
    done++;
    renderProgress();
    // LocationIQ free tier: max 2 requests/second. Two lookups per hotel when fallback triggers,
    // so pace slightly slower to stay safely within rate limits.
    await new Promise(function(r){setTimeout(r,650)});
  }

  enrichRunning=false;
  if(btn){btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Enrich All Addresses';btn.style.background='#fff';btn.style.color='#4F46E5';btn.style.borderColor='#C7D2FE';}
  if(statusEl){
    statusEl.innerHTML='<div style="background:'+(enrichStop?'#FEF3C7':'#F0FDF4')+';border:1px solid '+(enrichStop?'#FDE68A':'#BBF7D0')+';border-radius:12px;padding:14px 16px;margin-bottom:14px;font-size:13px;font-weight:600;color:'+(enrichStop?'#D97706':'#16A34A')+'">'+
      (enrichStop?'Stopped. ':'Done! ')+found+' addresses found, '+failed+' not found, out of '+done+' processed.</div>';
  }
  renderHotelView();
}

async function geocodeQuery(q){
  var query=encodeURIComponent(q);
  var res=await fetch('https://us1.locationiq.com/v1/search?key=pk.4b35d11f7be54b3103d4ce2cda5bc512&q='+query+'&format=json&addressdetails=1&limit=1&countrycodes=id&normalizeaddress=1');
  var data=await res.json();
  if(data&&data.length>0&&data[0].display_name){
    return {address:data[0].display_name,lat:data[0].lat?parseFloat(data[0].lat):null,lon:data[0].lon?parseFloat(data[0].lon):null};
  }
  return null;
}

function isShortResult(addr){
  if(!addr)return true;
  return !/\bjl\.?\b/i.test(addr) && addr.split(',').length<4;
}

function stripBrandKeywords(name){
  // Remove reseller/brand noise so the geocoder focuses on the actual location, not the listing title
  return name
    .replace(/\bredd?oorz\b/gi,'')
    .replace(/\bsyariah\b/gi,'')
    .replace(/\bplus\b/gi,'')
    .replace(/\burbanview\b/gi,'')
    .replace(/\boyo\b/gi,'')
    .replace(/\bnear\b/gi,'')
    .replace(/^[\s@\-:,]+/,'')
    .replace(/\s{2,}/g,' ')
    .trim();
}

async function findHotelAddress(){
  var nameInp=document.getElementById('ho-name');
  var statusEl=document.getElementById('ho-find-status');
  var btn=document.getElementById('ho-find-addr-btn');
  var name=nameInp?nameInp.value.trim():'';
  if(!name){alert('Enter the property name first.');return}
  btn.disabled=true;
  var origHtml=btn.innerHTML;
  btn.innerHTML='<div class="ai-spinner" style="width:13px;height:13px;border-width:2px"></div>Searching...';
  statusEl.textContent='';
  statusEl.style.color='var(--txt3)';
  try{
    // Attempt 1: full property name as-is (best case: hotel exists as a named POI in OSM)
    var result=await geocodeQuery(name+', Indonesia');

    // Attempt 2: if result is missing or too short (just province/country level),
    // strip brand/reseller keywords so the geocoder searches the actual place name only
    if(isShortResult(result&&result.address)){
      var stripped=stripBrandKeywords(name);
      if(stripped&&stripped.length>2){
        var result2=await geocodeQuery(stripped+', Indonesia');
        if(result2&&!isShortResult(result2.address))result=result2;
        else if(result2&&!result)result=result2;
      }
    }

    if(result&&result.address){
      document.getElementById('ho-address').value=result.address;
      var latInp=document.getElementById('ho-lat');
      var lonInp=document.getElementById('ho-lon');
      if(latInp)latInp.value=result.lat||'';
      if(lonInp)lonInp.value=result.lon||'';
      if(isShortResult(result.address)){
        statusEl.textContent='Alamat ditemukan tapi masih kurang detail (hotel mungkin belum terdaftar lengkap di peta). Bisa diedit manual.';
        statusEl.style.color='#F59E0B';
      }else{
        statusEl.textContent='Alamat lengkap ditemukan dan diisi otomatis.';
        statusEl.style.color='var(--green)';
      }
    }else{
      statusEl.textContent='Alamat tidak ditemukan. Coba edit nama atau isi manual.';
      statusEl.style.color='#F59E0B';
    }
  }catch(e){
    statusEl.textContent='Search failed: '+e.message;
    statusEl.style.color='#DC2626';
  }
  btn.disabled=false;
  btn.innerHTML=origHtml;
}

async function saveHotelForm(){

  var parseNum=function(v){v=v.trim();return v===''?null:Number(v)};
  var latEl=document.getElementById('ho-lat');
  var lonEl=document.getElementById('ho-lon');
  var payload={
    name:name,
    price_reddoorz:parseNum(document.getElementById('ho-reddoorz').value),
    price_superior:parseNum(document.getElementById('ho-superior').value),
    price_double:parseNum(document.getElementById('ho-double').value),

    lon:lonEl?parseNum(lonEl.value):null,

    updated_at:new Date().toISOString()

    res=await sb.from('hotels').update(payload).eq('id',editingHotelId);
  }else{
    res=await sb.from('hotels').insert([payload]);
  }
  if(res.error){alert('Error: '+res.error.message);return}
  closeModal();
  renderHotelView();
}

async function saveArticleForm(){
  var title=document.getElementById('art-title').value.trim();
  if(!title){alert('Title is required');return}
  var tagsStr=document.getElementById('art-tags').value.trim();
  var payload={
    title:title,
    excerpt:document.getElementById('art-excerpt').value.trim(),
    cover_image:document.getElementById('art-cover').value.trim(),
    content:document.getElementById('art-content').value,
    tags:tagsStr?tagsStr.split(',').map(function(t){return t.trim()}).filter(Boolean):[],
    published:document.getElementById('art-published').checked,
    author_name:'Dean Designers',
    slug:title.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').substring(0,80)
  };
  if(editingArticleId){
    await sb.from('articles').update(payload).eq('id',editingArticleId);
  }else{
    await sb.from('articles').insert([payload]);
  }
  closeModal();
  renderArticlesView();
}

async function runAIWrite(){
  var topic=document.getElementById('ai-topic').value.trim();
  if(!topic){alert('Please enter a topic');return}
  var btn=document.getElementById('ai-write-btn');
  var status=document.getElementById('ai-write-status');
  btn.disabled=true;btn.textContent='Generating...';
  status.textContent='Connecting to AI...';
  try{
    var res=await fetch('/api/auto-article',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({custom_topic:topic})});
    var contentType=res.headers.get('content-type')||'';
    if(!contentType.includes('application/json')){
      status.textContent='Error: API not found. Make sure auto-article.js is in api/ folder.';
      btn.disabled=false;btn.textContent='Generate Article';return;
    }
    var data=await res.json();
    if(data.success){
      status.textContent='Article published: '+data.articles[0].title;
      setTimeout(function(){closeModal();renderArticlesView();},1200);
    }else{
      status.textContent='Error: '+(data.error||'Unknown error');
      btn.disabled=false;btn.textContent='Generate Article';
    }
  }catch(err){
    status.textContent='Network error: '+err.message;
    btn.disabled=false;btn.textContent='Generate Article';
  }
}

async function loadAgentStats(){
  if(!sb)return;
  var{data}=await sb.from('articles').select('id,title,created_at,cover_image,author_name').eq('author_name','Dean Designers AI').order('created_at',{ascending:false}).limit(20);
  
  var total=document.getElementById('stat-total');
  var today_el=document.getElementById('stat-today');
  var last_el=document.getElementById('stat-last');
  var recent_el=document.getElementById('recent-ai-articles');
  
  if(!data||!data.length){
    if(total)total.textContent='0';
    if(today_el)today_el.textContent='0';
    if(last_el)last_el.textContent='Never';
    if(recent_el)recent_el.innerHTML='<div style="font-size:13px;color:var(--txt3);text-align:center;padding:20px">No AI articles yet. Run the agent to publish your first articles.</div>';
    return;
  }
  
  var today=new Date().toDateString();
  var todayCount=data.filter(function(a){return new Date(a.created_at).toDateString()===today}).length;
  
  if(total)total.textContent=data.length;
  if(today_el)today_el.textContent=todayCount;
  if(last_el)last_el.textContent=fmtDate(data[0].created_at);
  
  if(recent_el){
    var rh='<div style="display:flex;flex-direction:column;gap:10px">';
    data.slice(0,5).forEach(function(a){
      rh+='<div style="display:flex;align-items:center;gap:12px;padding:10px;background:var(--bg);border-radius:10px">';
      if(a.cover_image)rh+='<img src="'+esc(a.cover_image)+'" style="width:48px;height:48px;object-fit:cover;border-radius:8px;flex-shrink:0"/>';
      else rh+='<div style="width:48px;height:48px;background:linear-gradient(135deg,#8B5CF6,#6D28D9);border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></div>';
      rh+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(a.title)+'</div>';
      rh+='<div style="font-size:11px;color:var(--txt3);margin-top:2px">'+fmtDate(a.created_at)+'</div></div>';
      rh+='<span style="background:rgba(29,191,115,0.1);color:var(--green);padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;flex-shrink:0">Published</span>';
      rh+='</div>';
    });
    rh+='</div>';

function addAgentLog(msg,type){
  var ts=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  aiAgentLogs.push({msg:'['+ts+'] '+msg,type:type||'info'});
  var el=document.getElementById('agent-log');
  if(el){
    var div=document.createElement('div');
    div.style.color=type==='success'?'#3FB950':type==='error'?'#F85149':type==='warn'?'#E3B341':'#8B949E';
    div.textContent='['+ts+'] '+msg;
    el.appendChild(div);
    el.scrollTop=el.scrollHeight;
  }
}

function clearAgentLog(){
  aiAgentLogs=[];
  var el=document.getElementById('agent-log');
  if(el){el.innerHTML='<div style="color:#484F58">$ Log cleared</div>';}
}

async function runAIAgent(){
  if(aiAgentRunning){return;}
  aiAgentRunning=true;
  var btn=document.getElementById('agent-run-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<div style="width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite"></div>Running...';}
  addAgentLog('Initializing AI Article Agent...','info');
  addAgentLog('Connecting to Aivene GPT-4o API...','info');
  addAgentLog('Selecting 2 topics from SEO pool...','info');
  try{
    addAgentLog('Calling /api/auto-article...','info');
    var res=await fetch('/api/auto-article',{method:'GET'});
    var contentType=res.headers.get('content-type')||'';
    if(!contentType.includes('application/json')){
      var rawText=await res.text();
      if(rawText.includes('<!DOCTYPE')){
        addAgentLog('Error: API endpoint /api/auto-article not found (404). Make sure auto-article.js is uploaded to api/ folder in GitHub.','error');
      }else{
        addAgentLog('Error: Unexpected response from API: '+rawText.substring(0,150),'error');
      }
      aiAgentRunning=false;
      var btn=document.getElementById('agent-run-btn');
      if(btn){btn.disabled=false;btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21"/></svg>Run Now (2 Articles)';}
      return;
    }
    var data=await res.json();
    if(data.success){
      addAgentLog('Agent completed successfully','success');
      if(data.articles){
        data.articles.forEach(function(a,i){
          addAgentLog('Article '+(i+1)+' published: '+a.title,'success');
        });
      }
      addAgentLog('Articles now live on website','success');
      setTimeout(function(){loadAgentStats();},1000);
    }else{
      addAgentLog('Error: '+(data.error||'Unknown error'),'error');
      addAgentLog('Check: Is auto-article.js uploaded to api/ folder?','warn');
    }
  }catch(err){
    addAgentLog('Network error: '+err.message,'error');
  }
  aiAgentRunning=false;
  if(btn){btn.disabled=false;btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21"/></svg>Run Now (2 Articles)';}
}

async function runCustomTopic(){
  var inp=document.getElementById('custom-topic-inp');
  if(!inp||!inp.value.trim()){alert('Please enter a topic first.');return;}
  var topic=inp.value.trim();
  if(aiAgentRunning){alert('Agent is already running. Please wait.');return;}
  aiAgentRunning=true;
  addAgentLog('Custom topic received: '+topic,'info');
  addAgentLog('Sending to GPT-4o...','info');
  try{
    var res=await fetch('/api/auto-article',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({custom_topic:topic})});
    var contentType=res.headers.get('content-type')||'';
    if(!contentType.includes('application/json')){
      addAgentLog('Error: API not found. Upload auto-article.js to api/ folder in GitHub.','error');
      aiAgentRunning=false;return;
    }
    var data=await res.json();
    if(data.success){
      addAgentLog('Custom article published: '+data.articles[0].title,'success');
      addAgentLog('Article is now live on website','success');
      inp.value='';
      setTimeout(function(){loadAgentStats();},1000);
    }else{
      addAgentLog('Error: '+(data.error||'Unknown'),'error');
    }
  }catch(err){
    addAgentLog('Network error: '+err.message,'error');
  }
  aiAgentRunning=false;
}

async function adStartRec(isMob){

  var mime=MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/mp4';
  adMediaRec=new MediaRecorder(stream,{mimeType:mime});adRecChunks=[];
  adMediaRec.ondataavailable=function(e){if(e.data.size>0)adRecChunks.push(e.data)};
  adMediaRec.onstop=async function(){stream.getTracks().forEach(function(t){t.stop()});if(!adRecChunks.length){adRecording=false;return;}var blob=new Blob(adRecChunks,{type:adMediaRec.mimeType});if(blob.size>500)await adUploadVN(blob,mime.includes('webm')?'webm':'mp4');adRecording=false;renderChatRoom(isMob?'mobile':undefined)};
  adMediaRec.start();adRecording=true;adRecSec=0;

  }catch(e){alert('Microphone access denied.')}
}

// Sound effects
let adminLastMsgCount=0;
function playSendSound(){
  try{
    const c=new(window.AudioContext||window.webkitAudioContext)();
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    o.frequency.setValueAtTime(1200,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(600,c.currentTime+0.06);
    o.type='sine';g.gain.setValueAtTime(0.2,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.08);
    o.start();o.stop(c.currentTime+0.08);
  }catch(e){}
}
function playReceiveSound(){
  try{
    const c=new(window.AudioContext||window.webkitAudioContext)();
    const o1=c.createOscillator(),o2=c.createOscillator(),g=c.createGain();
    o1.connect(g);o2.connect(g);g.connect(c.destination);
    o1.frequency.value=880;o2.frequency.value=1320;
    o1.type='sine';o2.type='sine';
    g.gain.setValueAtTime(0.15,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);
    o1.start(c.currentTime);o1.stop(c.currentTime+0.15);
    o2.start(c.currentTime+0.1);o2.stop(c.currentTime+0.3);
  }catch(e){}
}

var gigSlideIdx={};
function slideGig(id,dir){
  var g=allGigs.find(function(x){return x.id===id});if(!g)return;
  var imgs=g.gallery_urls||[];if(typeof imgs==='string')try{imgs=JSON.parse(imgs)}catch(e){imgs=[]}
  if(imgs.length<2)return;
  if(!gigSlideIdx[id])gigSlideIdx[id]=0;
  gigSlideIdx[id]=(gigSlideIdx[id]+dir+imgs.length)%imgs.length;
  var slider=document.getElementById('gs-'+id);
  if(slider)slider.style.transform='translateX(-'+(gigSlideIdx[id]*100)+'%)';
  var dots=document.getElementById('gd-'+id);
  if(dots){var spans=dots.querySelectorAll('span');spans.forEach(function(s,i){s.style.background=i===gigSlideIdx[id]?'#fff':'rgba(255,255,255,0.4)'})}
}

async function uploadGigImages(){
  var input=document.getElementById('ge-img-upload');if(!input||!input.files.length)return;
  var gallery=window._gigEditGallery||[];
  var remaining=5-gallery.length;
  var files=Array.from(input.files).slice(0,remaining);
  for(var i=0;i<files.length;i++){
    var file=files[i];
    var path='gigs/'+Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9.-]/g,'_');
    var r=await sb.storage.from('uploads').upload(path,file);
    if(!r.error){
      var url=sb.storage.from('uploads').getPublicUrl(path).data.publicUrl;
      gallery.push(url);
    }
  }
  window._gigEditGallery=gallery;
  // Re-render gallery in editor
  openGigEditor(window._gigEditId);
}

function removeGigImage(idx){
  var gallery=window._gigEditGallery||[];
  gallery.splice(idx,1);
  window._gigEditGallery=gallery;
  openGigEditor(window._gigEditId);
}

    title:document.getElementById('ge-title').value.trim(),

    review_count:parseInt(document.getElementById('ge-reviews').value)||0,
    orders_count:parseInt(document.getElementById('ge-orders').value)||0,
    basic_price:parseFloat(document.getElementById('ge-bp').value)||50,
    basic_delivery:parseInt(document.getElementById('ge-bd').value)||3,
    basic_revisions:document.getElementById('ge-br').value||'2 Revisions',
    basic_desc:document.getElementById('ge-bdesc').value.trim(),
    basic_features:safeJSON(document.getElementById('ge-bf').value),
    standard_price:parseFloat(document.getElementById('ge-sp').value)||75,
    standard_delivery:parseInt(document.getElementById('ge-sd').value)||3,
    standard_revisions:document.getElementById('ge-sr').value||'8 Revisions',
    standard_desc:document.getElementById('ge-sdesc').value.trim(),
    standard_features:safeJSON(document.getElementById('ge-sf').value),

    premium_delivery:parseInt(document.getElementById('ge-pd').value)||5,
    premium_revisions:document.getElementById('ge-pr').value||'Unlimited',
    premium_desc:document.getElementById('ge-pdesc').value.trim(),
    premium_features:safeJSON(document.getElementById('ge-pf').value),
  };
  if(!data.title||!data.slug){alert('Title and slug required');return}
  var err;
  if(id){err=(await sb.from('gigs').update(data).eq('id',id)).error}

function safeJSON(s){try{return JSON.parse(s)}catch(e){return s.split(',').map(function(x){return x.trim()}).filter(Boolean)}}

// Swap sort_order with the neighbor in the given direction. Simpler than
// drag-drop and matches the arrow buttons in the list view.
async function moveCardOrder(id,dir){
  if(!sb) return;
  var idx=allCards.findIndex(function(c){return c.id===id});
  var swapIdx=idx+dir;
  if(idx<0||swapIdx<0||swapIdx>=allCards.length) return;
  var a=allCards[idx], b=allCards[swapIdx];
  var soA=a.sort_order||0, soB=b.sort_order||0;
  // If they happen to be equal, force a delta so the swap is visible.
  if(soA===soB){ soA=idx*10; soB=swapIdx*10; }
  await Promise.all([
    sb.from('service_cards').update({sort_order:soB}).eq('id',a.id),
    sb.from('service_cards').update({sort_order:soA}).eq('id',b.id),
  ]);
  renderCardsView();
}

// Refreshes the live preview inside the modal without redrawing the whole thing
function updateCardPreview(){
  var l1=document.getElementById('ce-line1'); var l2=document.getElementById('ce-line2');
  var pr=document.getElementById('ce-price');
  var toneInp=document.querySelector('input[name="ce-tone"]:checked');

  var priceEl=document.getElementById('ce-preview-price');
  var previewEl=document.getElementById('ce-preview');
  titleEl.innerHTML=esc(l1.value||'Line 1')+'<br>'+esc(l2.value||'Line 2');
  priceEl.textContent='from $'+(Number(pr.value)||0);

    var t=CARD_TONES.find(function(x){return x.v===toneInp.value})||CARD_TONES[0];

  }
}

async function uploadCardImage(){
  var input=document.getElementById('ce-img-input');
  if(!input||!input.files||!input.files[0]||!sb) return;
  var file=input.files[0];
  // Basic size guard so an admin doesn't upload a 15MB DSLR original by mistake
  if(file.size > 5*1024*1024){
    if(!confirm('This image is '+(file.size/1024/1024).toFixed(1)+'MB. Upload anyway? (recommended: under 2MB for fast page loads)')) return;
  }
  var path='service-cards/'+Date.now()+'-'+file.name.replace(/[^a-zA-Z0-9.-]/g,'_');
  var r=await sb.storage.from('uploads').upload(path,file);
  if(r.error){ alert('Upload failed: '+r.error.message); return; }
  var url=sb.storage.from('uploads').getPublicUrl(path).data.publicUrl;
  window._cardEditImg=url;
  // Repaint the modal so preview + thumbnail update
  var card=allCards.find(function(c){return c.id===window._cardEditId})||{slug:'',line1:'',line2:'',price:50,tone:'t-ink',sort_order:0,is_active:true};
  // Preserve the values the admin has already typed by grabbing them before repaint
  var draft={
    id: window._cardEditId,
    slug: document.getElementById('ce-slug').value,
    line1: document.getElementById('ce-line1').value,
    line2: document.getElementById('ce-line2').value,
    price: Number(document.getElementById('ce-price').value)||0,
    sort_order: Number(document.getElementById('ce-sort').value)||0,
    tone: (document.querySelector('input[name="ce-tone"]:checked')||{value:card.tone}).value,
    img_url: url,
    is_active: card.is_active,
  };
  // Merge draft over the loaded card so re-opening shows the in-progress state
  if(window._cardEditId){
    var idx=allCards.findIndex(function(c){return c.id===window._cardEditId});
    if(idx>=0) allCards[idx]=Object.assign({},allCards[idx],draft);
  }
  openCardEditor(window._cardEditId);
}

function removeCardImage(){
  window._cardEditImg='';
  var idx=window._cardEditId?allCards.findIndex(function(c){return c.id===window._cardEditId}):-1;
  if(idx>=0) allCards[idx].img_url='';
  openCardEditor(window._cardEditId);
}

async function saveCard(id){
  if(!sb) return;
  var data={
    slug:      document.getElementById('ce-slug').value.trim(),
    line1:     document.getElementById('ce-line1').value.trim(),
    line2:     document.getElementById('ce-line2').value.trim(),
    price:     Number(document.getElementById('ce-price').value)||0,
    sort_order:Number(document.getElementById('ce-sort').value)||0,
    tone:      (document.querySelector('input[name="ce-tone"]:checked')||{value:'t-ink'}).value,
    img_url:   window._cardEditImg||'',
  };
  if(!data.slug){ alert('Slug is required (this becomes the URL /'+'{slug}' + ' when the card is clicked).'); return; }
  if(!data.line1 && !data.line2){ alert('At least one line of the title is required.'); return; }

  var err;
  if(id){
    err=(await sb.from('service_cards').update(data).eq('id',id)).error;
  } else {
    data.is_active=true;
    err=(await sb.from('service_cards').insert(data)).error;
  }
  if(err){
    if(String(err.message||'').toLowerCase().indexOf('duplicate')>=0 || err.code==='23505'){
      alert('That slug is already used by another card. Each card needs a unique slug.');
    } else {
      alert('Error saving card: '+err.message);
    }
    return;
  }
  closeCardEditor();
  renderCardsView();
}

// ═══ Realtime analytics ═══
var _anCh=null, _anTimer=null, _anLive=0;

function startAnalyticsRealtime(){
  stopAnalyticsRealtime();
  if(!sb) return;

  // Live push on every new event
  _anCh = sb.channel('analytics-live-'+Date.now())
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'visitor_events'},function(p){
      _anLive++;
      flashLiveBadge(p.new);
      // Debounce the full re-render so a burst of events does not thrash
      clearTimeout(window._anDebounce);
      window._anDebounce=setTimeout(function(){
        if(currentView==='analytics') renderAnalyticsView(true);
      },1200);
    })
    .subscribe();

  // Safety net: refresh every 10s even if realtime drops
  _anTimer = setInterval(function(){
    if(currentView==='analytics') renderAnalyticsView(true);
  }, 10000);

  // Live "who is on the site right now" ticker
  setInterval(updateLiveNow, 5000);
  updateLiveNow();
}

function stopAnalyticsRealtime(){
  if(_anCh){ _anCh.unsubscribe(); _anCh=null; }
  if(_anTimer){ clearInterval(_anTimer); _anTimer=null; }
}

// Pulse a badge when an event lands
function flashLiveBadge(ev){
  var b=document.getElementById('an-live-badge');
  if(!b) return;
  b.style.background='rgba(29,191,115,.25)';
  b.style.borderColor='rgba(29,191,115,.5)';
  setTimeout(function(){
    b.style.background='rgba(29,191,115,.1)';
    b.style.borderColor='rgba(29,191,115,.25)';
  },500);

  var feed=document.getElementById('an-live-feed');
  if(feed && ev){
    var LBL={page_view:'landed on the site',cta_hero_click:'clicked Start Order',step_service:'chose a service',step_brand:'entered brand name',step_qty:'chose quantity',step_brief:'started the brief',step_package:'picked a package',step_payment:'reached payment',payment_completed:'PAID',exit:'left'};
    var row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid rgba(255,255,255,.05);font-size:12.5px;color:#CBD5E1;opacity:0;transform:translateY(-4px);transition:all .3s';
    var isPaid=ev.event==='payment_completed';
    row.innerHTML='<span style="width:6px;height:6px;border-radius:50%;background:'+(isPaid?'#1DBF73':'#60A5FA')+';flex-shrink:0"></span>'+
      '<span style="color:#94A3B8">'+esc((ev.device||'?'))+' visitor</span>'+
      '<span style="color:'+(isPaid?'#1DBF73':'#E2E8F0')+';font-weight:'+(isPaid?'700':'500')+'">'+(LBL[ev.event]||esc(ev.event))+'</span>'+
      '<span style="margin-left:auto;color:#64748B;font-size:11px">now</span>';
    feed.insertBefore(row, feed.firstChild);
    requestAnimationFrame(function(){ row.style.opacity='1'; row.style.transform='translateY(0)'; });
    while(feed.children.length>12) feed.removeChild(feed.lastChild);
  }
}

// Count sessions active in the last 2 minutes
async function updateLiveNow(){
  if(!sb || currentView!=='analytics') return;
  var since=new Date(Date.now()-120000).toISOString();
  // Count unique PEOPLE active in the last 2 minutes, not tabs
  var r=await sb.from('visitor_events').select('session_id,meta').gte('created_at',since);
  var set={};
  (r.data||[]).forEach(function(e){
    var id=e.session_id;
    try{ if(e.meta && e.meta.visitor_id) id=e.meta.visitor_id; }catch(x){}
    set[id]=1;
  });
  var n=Object.keys(set).length;
  var el=document.getElementById('an-live-count');
  var dot=document.getElementById('an-live-dot');
  if(el) el.textContent=n;
  if(dot) dot.style.background = n>0 ? '#1DBF73' : '#475569';
}

async function renderAnalyticsView(silent){
  var el=document.getElementById('analytics-area'); if(!el)return;
  if(!silent) el.innerHTML='<div style="padding:40px;text-align:center;color:var(--txt3)">Loading...</div>';

  var days=parseInt((document.getElementById('an-range')||{}).value||'7');
  var since=new Date(Date.now()-days*864e5).toISOString();

  var ev=await sb.from('visitor_events').select('*').gte('created_at',since).order('created_at',{ascending:false}).limit(5000);
  var ss=await sb.from('visitor_sessions').select('*').gte('last_seen',since).order('last_seen',{ascending:false}).limit(2000);

  if(ev.error||ss.error){
    el.innerHTML='<div style="padding:40px;text-align:center;color:#F87171">Analytics tables not found.<br><br><span style="color:var(--txt3);font-size:13px">Run <b>analytics-migration.sql</b> in your Supabase SQL Editor first.</span></div>';
    return;
  }

  var events=ev.data||[], sessions=ss.data||[];

  var liveBar='<div style="display:flex;gap:16px;align-items:stretch;margin-bottom:20px;flex-wrap:wrap">'+
     '<div id="an-live-badge" style="display:flex;align-items:center;gap:10px;background:rgba(29,191,115,.1);border:1px solid rgba(29,191,115,.25);border-radius:12px;padding:14px 18px;transition:all .4s;min-width:190px">'+
       '<span id="an-live-dot" style="width:9px;height:9px;border-radius:50%;background:#475569;box-shadow:0 0 0 3px rgba(29,191,115,.2);animation:pulse 1.8s infinite"></span>'+
       '<div><div style="font-size:22px;font-weight:800;color:#F1F5F9;line-height:1"><span id="an-live-count">0</span></div>'+
       '<div style="font-size:11px;color:#94A3B8;margin-top:2px">on the site right now</div></div>'+
     '</div>'+
     '<div style="flex:1;min-width:260px;background:#161921;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:12px 16px;max-height:150px;overflow-y:auto">'+
       '<div style="font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">Live activity</div>'+
       '<div id="an-live-feed"><div style="padding:10px 0;font-size:12.5px;color:#475569">Waiting for visitors...</div></div>'+
     '</div>'+
     '</div>';

  if(sessions.length===0){
    el.innerHTML=liveBar+
      '<div style="padding:50px 20px;text-align:center;color:var(--txt3);background:#161921;border:1px solid rgba(255,255,255,.06);border-radius:12px">'+
      '<p style="font-size:15px;margin-bottom:6px;color:#94A3B8">No visitor data yet.</p>'+
      '<p style="font-size:13px;margin-bottom:16px">Open the site in another tab and click around - you will see yourself appear here live.</p>'+
      '<a href="https://www.createclothingdesign.com" target="_blank" style="display:inline-block;padding:9px 18px;background:#1DBF73;color:#fff;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none">Open the site \u2192</a>'+
      '</div>';
    updateLiveNow();
    return;
  }

  // ── Funnel counts: unique PEOPLE that reached each event ──
  // Prefer visitor_id (survives tabs) and fall back to session_id.
  function who(e){
    try { return (e.meta && e.meta.visitor_id) ? e.meta.visitor_id : e.session_id; }
    catch(x){ return e.session_id; }
  }
  var counts={};
  FUNNEL.forEach(function(f){
    var set={};
    events.forEach(function(e){ if(e.event===f.key) set[who(e)]=1; });
    counts[f.key]=Object.keys(set).length;
  });
  // Total unique people = anyone who fired any event
  var allPeople={};
  events.forEach(function(e){ allPeople[who(e)]=1; });
  var top=Object.keys(allPeople).length || sessions.length;
  counts['page_view']=top;

  // ── Where do they die? ──
  var exits={};
  sessions.forEach(function(s){
    var k=s.max_step||0;
    exits[k]=(exits[k]||0)+1;
  });

  var converted=sessions.filter(function(s){return s.converted}).length;
  var convRate=top>0?((converted/top)*100).toFixed(1):'0.0';
  var avgDur=sessions.length?Math.round(sessions.reduce(function(a,s){return a+(s.duration_sec||0)},0)/sessions.length):0;
  var bounced=sessions.filter(function(s){return (s.max_step||0)===0 && (s.duration_sec||0)<15}).length;
  var bounceRate=sessions.length?((bounced/sessions.length)*100).toFixed(0):'0';

  // ── Devices ──
  var dev={};
  sessions.forEach(function(s){ var d=s.device||'unknown'; dev[d]=(dev[d]||0)+1; });

  // ── Traffic sources ──
  var src={};
  sessions.forEach(function(s){
    var r=s.utm_source||s.referrer||'direct';
    if(r.indexOf('facebook')>=0||r.indexOf('meta_ads')>=0||r.indexOf('fbclid')>=0) r='Meta Ads';
    else if(r.indexOf('google')>=0) r='Google';
    else if(r.indexOf('instagram')>=0) r='Instagram';
    else if(r==='direct'||r==='') r='Direct';
    else { try{ r=new URL(r).hostname.replace('www.','') }catch(e){} }
    src[r]=(src[r]||0)+1;
  });

  // ═══ BUILD UI ═══
  var h='';

  h+=liveBar;

  // Top stats
  h+='<div class="stats" style="margin-bottom:24px">'+
     '<div class="stat"><div class="stat-val">'+top+'</div><div class="stat-label">Visitors</div></div>'+
     '<div class="stat"><div class="stat-val" style="color:'+(converted>0?'#1DBF73':'#F87171')+'">'+converted+'</div><div class="stat-label">Orders</div></div>'+
     '<div class="stat"><div class="stat-val" style="color:'+(parseFloat(convRate)>=1?'#1DBF73':'#FBBF24')+'">'+convRate+'%</div><div class="stat-label">Conversion Rate</div></div>'+
     '<div class="stat"><div class="stat-val">'+Math.floor(avgDur/60)+'m '+(avgDur%60)+'s</div><div class="stat-label">Avg. Time on Site</div></div>'+
     '<div class="stat"><div class="stat-val" style="color:'+(parseInt(bounceRate)>60?'#F87171':'#94A3B8')+'">'+bounceRate+'%</div><div class="stat-label">Bounced (&lt;15s)</div></div>'+
     '</div>';

  // ── FUNNEL ──
  h+='<div style="background:#161921;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;margin-bottom:20px">';
  h+='<h3 style="font-size:15px;font-weight:700;margin:0 0 4px;color:#F1F5F9">Conversion Funnel</h3>';
  h+='<p style="font-size:12px;color:#64748B;margin:0 0 18px">Where visitors drop off. The biggest red number is your problem.</p>';

  var prev=top;
  FUNNEL.forEach(function(f,i){
    var n=counts[f.key]||0;
    var pct=top>0?(n/top*100):0;
    var dropN=prev-n;
    var dropPct=prev>0?(dropN/prev*100):0;
    var bad=dropPct>=50 && i>0 && prev>0;

    h+='<div style="margin-bottom:12px">'+
       '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">'+
         '<span style="font-size:13px;font-weight:600;color:'+(f.key==='payment_completed'?'#1DBF73':'#E2E8F0')+'">'+f.label+'</span>'+
         '<span style="font-size:12px;color:#94A3B8"><b style="color:#F1F5F9;font-size:14px">'+n+'</b> &nbsp;('+pct.toFixed(0)+'%)</span>'+
       '</div>'+
       '<div style="height:9px;background:rgba(255,255,255,.05);border-radius:5px;overflow:hidden">'+
         '<div style="height:100%;width:'+Math.max(pct,0.5)+'%;background:'+(f.key==='payment_completed'?'#1DBF73':'linear-gradient(90deg,#1DBF73,#3B82F6)')+';border-radius:5px;transition:width .4s"></div>'+
       '</div>';

    if(i>0 && dropN>0){
      h+='<div style="font-size:11px;color:'+(bad?'#F87171':'#64748B')+';margin-top:4px;font-weight:'+(bad?'700':'400')+'">'+
         (bad?'\u26A0 ':'')+'\u2193 '+dropN+' left here ('+dropPct.toFixed(0)+'% drop)'+
         '</div>';
    }
    h+='</div>';
    prev=n;
  });
  h+='</div>';

  // ── DIAGNOSIS ──
  var worstIdx=-1, worstDrop=0;
  var p2=top;
  FUNNEL.forEach(function(f,i){
    var n=counts[f.key]||0;
    if(i>0 && p2>0){
      var d=(p2-n)/p2*100;
      if(d>worstDrop && p2>=3){ worstDrop=d; worstIdx=i; }
    }
    p2=n;
  });

  h+='<div style="background:#161921;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:20px;margin-bottom:20px">';
  h+='<h3 style="font-size:15px;font-weight:700;margin:0 0 14px;color:#F1F5F9">Diagnosis</h3>';

  if(top<20){
    h+='<div style="padding:14px;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);border-radius:8px;font-size:13px;color:#BFDBFE;line-height:1.6">'+
       '<b>Not enough data yet.</b><br>You have '+top+' visitors. Wait for at least 50-100 before drawing conclusions - anything less is noise, not signal.</div>';
  } else if(worstIdx>0 && worstDrop>=40){
    var f=FUNNEL[worstIdx];
    var advice={
      'cta_hero_click':'Visitors land but never click the button. This means the offer is not clear or not compelling in the first 5 seconds. Check: is the headline specific? Is the price visible? Does the ad promise match what they see?',
      'step_service':'They click the CTA but never pick a service. The two options may be confusing, or the page may be scrolling somewhere unexpected. Test the button on mobile.',
      'step_brand':'They pick a service but abandon at the brand name field. Some visitors do not have a brand name yet. Consider making this optional or adding "Not sure yet? Skip this."',
      'step_qty':'They stall at quantity. The pricing may be unclear at this step. Show the running total live as they change quantity.',
      'step_brief':'The brief is killing your conversions. Writing a design brief is real work and most people will not do it on a first visit. Make it skippable - let them order and send the brief later via WhatsApp.',
      'step_package':'They see the packages and leave. This is a price objection. Either the price is too high for this audience, or the value is not clear enough at the point of decision.',
      'step_payment':'They reach payment and abandon. This is a trust problem, not a price problem - they already accepted the price. Add: money-back guarantee near the button, secure-payment badges, and a visible way to contact you before paying.',
    };
    h+='<div style="padding:14px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:8px;margin-bottom:12px">'+
       '<div style="font-size:13px;font-weight:700;color:#FCA5A5;margin-bottom:6px">Biggest leak: '+f.label+' ('+worstDrop.toFixed(0)+'% drop)</div>'+
       '<div style="font-size:13px;color:#CBD5E1;line-height:1.65">'+(advice[f.key]||'Investigate this step.')+'</div>'+
       '</div>';
  } else if(converted>0){
    h+='<div style="padding:14px;background:rgba(29,191,115,.08);border:1px solid rgba(29,191,115,.25);border-radius:8px;font-size:13px;color:#A7F3D0;line-height:1.6">'+
       '<b>Funnel is healthy.</b> No single step is losing more than 40% of visitors. Focus on getting more traffic.</div>';
  } else {
    h+='<div style="padding:14px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);border-radius:8px;font-size:13px;color:#FDE68A;line-height:1.6">'+
       'Visitors are moving through the funnel but nobody has paid yet. If people are reaching the payment step and stopping, the issue is trust - not price.</div>';
  }
  h+='</div>';

  // ── SOURCES + DEVICES ──
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">';

  h+='<div style="background:#161921;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:18px">'+
     '<h3 style="font-size:14px;font-weight:700;margin:0 0 12px;color:#F1F5F9">Traffic Source</h3>';
  Object.keys(src).sort(function(a,b){return src[b]-src[a]}).slice(0,6).forEach(function(k){
    var pct=(src[k]/sessions.length*100).toFixed(0);
    h+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;color:#CBD5E1">'+
       '<span>'+esc(k)+'</span><span style="color:#94A3B8"><b style="color:#F1F5F9">'+src[k]+'</b> ('+pct+'%)</span></div>';
  });
  h+='</div>';

  h+='<div style="background:#161921;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:18px">'+
     '<h3 style="font-size:14px;font-weight:700;margin:0 0 12px;color:#F1F5F9">Device</h3>';
  Object.keys(dev).sort(function(a,b){return dev[b]-dev[a]}).forEach(function(k){
    var pct=(dev[k]/sessions.length*100).toFixed(0);
    h+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;color:#CBD5E1">'+
       '<span style="text-transform:capitalize">'+esc(k)+'</span><span style="color:#94A3B8"><b style="color:#F1F5F9">'+dev[k]+'</b> ('+pct+'%)</span></div>';
  });
  h+='</div>';
  h+='</div>';

  // ── RECENT SESSIONS ──
  h+='<div style="background:#161921;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:18px">';
  h+='<h3 style="font-size:14px;font-weight:700;margin:0 0 12px;color:#F1F5F9">Recent Visitors</h3>';
  h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px">';
  h+='<tr style="color:#64748B;text-align:left"><th style="padding:6px 8px;font-weight:600">When</th><th style="padding:6px 8px;font-weight:600">Source</th><th style="padding:6px 8px;font-weight:600">Device</th><th style="padding:6px 8px;font-weight:600">Got to</th><th style="padding:6px 8px;font-weight:600">Time</th><th style="padding:6px 8px;font-weight:600">Result</th></tr>';

  var STEPN={0:'Just landed',1:'Service',2:'Brand name',3:'Quantity',4:'Brief',5:'Package',6:'Payment',7:'PAID'};
  sessions.slice(0,30).forEach(function(s){
    var ago=timeAgoShort(s.last_seen);
    var srcv=s.utm_source||s.referrer||'direct';
    if(srcv.indexOf('facebook')>=0||srcv.indexOf('meta_ads')>=0) srcv='Meta Ads';
    else if(srcv.indexOf('google')>=0) srcv='Google';
    else if(srcv==='direct'||srcv==='') srcv='Direct';
    else { try{ srcv=new URL(srcv).hostname.replace('www.','') }catch(e){} }
    var st=s.max_step||0;
    var dur=s.duration_sec||0;
    h+='<tr style="border-top:1px solid rgba(255,255,255,.05);color:#CBD5E1">'+
       '<td style="padding:8px">'+ago+'</td>'+
       '<td style="padding:8px">'+esc(srcv)+'</td>'+
       '<td style="padding:8px;text-transform:capitalize">'+esc(s.device||'-')+'</td>'+
       '<td style="padding:8px"><span style="font-size:11px;padding:2px 7px;border-radius:4px;background:'+(st>=6?'rgba(29,191,115,.12)':st>=4?'rgba(96,165,250,.12)':'rgba(255,255,255,.06)')+';color:'+(st>=6?'#1DBF73':st>=4?'#60A5FA':'#94A3B8')+'">'+(STEPN[st]||st)+'</span></td>'+
       '<td style="padding:8px;color:'+(dur<15?'#F87171':'#94A3B8')+'">'+Math.floor(dur/60)+'m '+(dur%60)+'s</td>'+
       '<td style="padding:8px">'+(s.converted?'<span style="color:#1DBF73;font-weight:700">Ordered</span>':'<span style="color:#64748B">Left</span>')+'</td>'+
       '</tr>';
  });
  h+='</table></div></div>';

  el.innerHTML=h;
}

function timeAgoShort(d){
  var s=Math.floor((Date.now()-new Date(d).getTime())/1000);
  if(s<60)return s+'s ago';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

</script>
</body>
</html>
